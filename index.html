<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="RxRef Pro">
<meta name="description" content="RxRef Pro — Pharmacy Study App for NAPLEX, PEBC, KAPS and all licensing exams. Drugs, Flashcards, Quiz, Interactions, Dosing.">
<title>RxRef Pro — Pharmacy Exam Study App</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM — Clean White + Monochrome
   Fraunces (editorial serif) + DM Sans (clean)
═══════════════════════════════════════════ */
:root {
  --bg: #fafafa;
  --surface: #f0f0f0;
  --card: #ffffff;
  --border: #e8e8e8;
  --border2: #d0d0d0;
  --text: #0a0a0a;
  --text2: #404040;
  --muted: #909090;
  --dim: #c8c8c8;

  --accent: #0a0a0a;
  --accent-bg: #f0f0f0;
  --green: #1a7a4a;
  --green-bg: #f0faf4;
  --red: #c0392b;
  --red-bg: #fdf5f4;
  --yellow: #b8860b;
  --yellow-bg: #fdfaf0;
  --blue: #1a4a8a;
  --blue-bg: #f0f4fa;
  --purple: #5a2d8a;
  --purple-bg: #f6f0fa;
  --orange: #c05a10;
  --orange-bg: #fdf5f0;

  --nav-h: 60px;
  --header-h: 56px;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  position: relative;
}

/* ── HEADER ── */
.app-header {
  height: var(--header-h);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  max-width: 100%;
}
.logo {
  font-family: 'Fraunces', serif;
  font-size: 1.45rem;
  font-weight: 900;
  letter-spacing: -0.5px;
  color: var(--text);
}
.logo sup {
  font-size: .5rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  vertical-align: super;
  color: var(--muted);
  margin-left: 2px;
}
.header-right { display: flex; align-items: center; gap: 8px; }
.streak-pill {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--yellow-bg);
  border: 1px solid #e8d48a;
  border-radius: 20px;
  padding: 4px 10px;
  font-size: .68rem;
  font-weight: 600;
  color: var(--yellow);
}
.hdr-btn {
  width: 34px; height: 34px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  font-size: .9rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.hdr-btn:hover { background: var(--border); }

/* ── SUBHEADER (contextual) ── */
.subheader {
  flex-shrink: 0;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: none;
}
.subheader.visible { display: block; }
.search-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
}
.search-input-wrap {
  flex: 1;
  position: relative;
}
.search-input-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: .85rem;
  color: var(--text);
  padding: 8px 12px 8px 34px;
  outline: none;
  transition: border-color .15s;
}
.search-input-wrap input:focus { border-color: var(--text); }
.search-input-wrap input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: .9rem;
  pointer-events: none;
}
.chips-row {
  display: flex;
  gap: 6px;
  padding: 0 14px 10px;
  overflow-x: auto;
  scrollbar-width: none;
}
.chips-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
  font-size: .65rem;
  font-weight: 500;
  letter-spacing: .04em;
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--muted);
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--text2); color: var(--text2); }
.chip.active { background: var(--text); border-color: var(--text); color: #fff; }

/* ── SCROLL AREA ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px 100px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#content {
  max-width: 1100px;
  margin: 0 auto;
}

/* ── DESKTOP GRID for drug cards ── */
@media(min-width: 768px) {
  .scroll-area { padding: 28px 40px 100px; }
  #content { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
  #content > .drug-card { margin-bottom: 0; }
  /* Non-card content should span full width */
  #content > .empty-state,
  #content > .dash-greeting,
  #content > .dash-sub,
  #content > .stats-grid,
  #content > .streak-bar,
  #content > .section-title,
  #content > .quick-actions,
  #content > .recent-list,
  #content > .flash-wrap,
  #content > .quiz-wrap,
  #content > .ix-wrap,
  #content > .bm-card,
  #content > .admin-stats,
  #content > .admin-form,
  #content > .custom-list-lbl,
  #content > .cdi {
    grid-column: 1 / -1;
  }
}
@media(min-width: 1024px) {
  #content { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
}

/* ══════════════════════════════════════
   DRUG CARDS
══════════════════════════════════════ */
.drug-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: box-shadow .2s, border-color .2s;
  animation: fadeUp .22s ease both;
}
.drug-card:hover { box-shadow: var(--shadow); }
.drug-card.bookmarked { border-color: #d4b840; }
.drug-card.custom { border-left: 3px solid var(--purple); }

.dc-header {
  padding: 14px 16px 10px;
  cursor: pointer;
  user-select: none;
}
.dc-row1 { display: flex; justify-content: space-between; align-items: flex-start; }
.dc-brand {
  font-family: 'Fraunces', serif;
  font-size: 1.15rem;
  font-weight: 700;
  line-height: 1.2;
  color: var(--text);
}
.dc-actions { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
.icon-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1rem;
  padding: 2px;
  opacity: .4;
  transition: opacity .15s, transform .15s;
  line-height: 1;
}
.icon-btn.active, .icon-btn:hover { opacity: 1; }
.icon-btn:active { transform: scale(1.2); }
.dc-generic { font-size: .75rem; color: var(--green); margin-top: 3px; font-weight: 500; }
.dc-tags { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
.tag {
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid;
}
.tag-class { background: var(--surface); border-color: var(--border); color: var(--muted); }
.tag-custom { background: var(--purple-bg); border-color: #c0a0d8; color: var(--purple); }
.dc-chevron { font-size: .65rem; color: var(--muted); margin-top: 6px; text-align: right; }

.dc-body { display: none; border-top: 1px solid var(--border); }
.dc-body.open { display: block; }

.dc-section {
  display: flex;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: .78rem;
  line-height: 1.55;
}
.dc-section:last-of-type { border-bottom: none; }
.dc-lbl {
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  min-width: 50px;
  flex-shrink: 0;
  padding-top: 2px;
}
.dc-val { flex: 1; color: var(--text2); font-weight: 400; }
.dc-val.moa { color: var(--blue); }
.dc-val.ind { color: var(--green); }
.dc-val.adr { color: var(--orange); }
.dc-val.dose { color: var(--purple); }
.dc-val.mem { color: var(--text2); font-style: italic; }

.dc-footer {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.dc-note {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: .78rem;
  color: var(--text);
  padding: 8px 11px;
  resize: none;
  min-height: 52px;
  outline: none;
  transition: border-color .15s;
  margin-bottom: 8px;
}
.dc-note:focus { border-color: var(--text); }
.dc-note::placeholder { color: var(--muted); }
.note-status { font-size: .6rem; color: var(--green); text-align: right; height: 12px; margin-bottom: 6px; }
.dc-btns { display: flex; gap: 7px; flex-wrap: wrap; }
.dc-btn {
  flex: 1;
  min-width: 70px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: .65rem;
  font-weight: 500;
  color: var(--muted);
  padding: 7px 4px;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
}
.dc-btn:hover { border-color: var(--text); color: var(--text); }
.dc-btn.ok { border-color: var(--green); color: var(--green); }
.dc-btn.danger:hover { border-color: var(--red); color: var(--red); }

/* ══════════════════════════════════════
   DASHBOARD / HOME
══════════════════════════════════════ */
.dash-greeting {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.dash-sub { font-size: .8rem; color: var(--muted); margin-bottom: 18px; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.stat-card .s-val {
  font-family: 'Fraunces', serif;
  font-size: 1.8rem;
  font-weight: 900;
  line-height: 1;
  color: var(--text);
  margin-bottom: 4px;
}
.stat-card .s-lbl { font-size: .68rem; color: var(--muted); font-weight: 500; }
.stat-card.accent { background: var(--text); border-color: var(--text); }
.stat-card.accent .s-val { color: #fff; }
.stat-card.accent .s-lbl { color: rgba(255,255,255,.6); }

.section-title {
  font-family: 'Fraunces', serif;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 10px;
  margin-top: 4px;
}

.streak-bar {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 16px;
  display: flex;
  gap: 12px;
  align-items: center;
}
.streak-days { display: flex; gap: 4px; flex: 1; }
.streak-day {
  flex: 1;
  height: 28px;
  border-radius: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .52rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
}
.streak-day.done { background: var(--text); border-color: var(--text); color: #fff; }
.streak-day.today { border-color: var(--yellow); color: var(--yellow); }

.quick-actions {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.qa-btn {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  text-align: left;
  transition: all .15s;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.qa-btn:hover { box-shadow: var(--shadow); border-color: var(--border2); }
.qa-icon { font-size: 1.4rem; }
.qa-label { font-size: .78rem; font-weight: 600; color: var(--text); }
.qa-sub { font-size: .65rem; color: var(--muted); }

.recent-list { display: flex; flex-direction: column; gap: 8px; }
.recent-item {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: all .15s;
}
.recent-item:hover { box-shadow: var(--shadow); }
.ri-brand { font-family: 'Fraunces', serif; font-size: .9rem; font-weight: 700; }
.ri-generic { font-size: .68rem; color: var(--green); margin-top: 1px; }
.ri-class { font-size: .6rem; color: var(--muted); }
.ri-arrow { color: var(--muted); font-size: .8rem; }

/* ══════════════════════════════════════
   FLASHCARDS
══════════════════════════════════════ */
.flash-wrap { max-width: 400px; margin: 0 auto; }
.flash-mode-btns { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin-bottom: 12px; }
.fmode-btn {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: .62rem;
  font-weight: 500;
  color: var(--muted);
  padding: 8px 6px;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
}
.fmode-btn.active { background: var(--text); border-color: var(--text); color: #fff; }
.flash-progress-bar { height: 3px; background: var(--border); border-radius: 10px; margin-bottom: 14px; overflow: hidden; }
.flash-progress-fill { height: 100%; background: var(--text); border-radius: 10px; transition: width .3s; }
.flash-counter { font-size: .7rem; color: var(--muted); text-align: center; margin-bottom: 10px; }

.flash-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 16px;
  min-height: 220px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 24px;
  cursor: pointer;
  text-align: center;
  position: relative;
  margin-bottom: 12px;
  transition: box-shadow .2s, transform .15s;
  user-select: none;
}
.flash-card:active { transform: scale(.98); }
.flash-card:hover { box-shadow: var(--shadow-md); }
.flash-card.flipped { background: var(--text); border-color: var(--text); }
.flash-side-lbl {
  position: absolute;
  top: 12px; left: 16px;
  font-size: .56rem;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
}
.flash-card.flipped .flash-side-lbl { color: rgba(255,255,255,.5); }
.flash-front { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; color: var(--text); }
.flash-card.flipped .flash-front { color: #fff; }
.flash-back { font-size: .82rem; color: #fff; line-height: 1.6; font-weight: 400; }
.flash-back-generic { font-size: .75rem; color: rgba(255,255,255,.7); margin-bottom: 6px; }
.flash-hint-txt { font-size: .65rem; color: var(--muted); margin-top: 12px; }
.flash-card.flipped .flash-hint-txt { color: rgba(255,255,255,.4); }
.flash-nav { display: flex; gap: 8px; margin-bottom: 14px; }
.flash-nav-btn {
  flex: 1;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: .78rem;
  font-weight: 500;
  color: var(--text2);
  padding: 11px;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
}
.flash-nav-btn:hover { border-color: var(--text); }
.flash-nav-btn.primary { background: var(--text); border-color: var(--text); color: #fff; }
.flash-nav-btn.correct { background: var(--green); border-color: var(--green); color: #fff; }
.flash-nav-btn.skip { border-style: dashed; }
.flash-scores { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.fs-box { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
.fs-box .fv { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 700; }
.fs-box .fl { font-size: .58rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .08em; }

/* ══════════════════════════════════════
   QUIZ
══════════════════════════════════════ */
.quiz-wrap { max-width: 420px; margin: 0 auto; }
.quiz-menu-header { text-align: center; padding: 10px 0 20px; }
.quiz-menu-header h2 { font-family: 'Fraunces', serif; font-size: 1.7rem; font-weight: 900; margin-bottom: 6px; }
.quiz-menu-header p { font-size: .78rem; color: var(--muted); line-height: 1.6; }
.quiz-mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.qm-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 14px;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
}
.qm-card:hover { box-shadow: var(--shadow); }
.qm-card.active { border-color: var(--text); background: var(--text); }
.qm-card.active .qm-name { color: #fff; }
.qm-card.active .qm-desc { color: rgba(255,255,255,.6); }
.qm-icon { font-size: 1.5rem; margin-bottom: 6px; }
.qm-name { font-size: .82rem; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.qm-desc { font-size: .65rem; color: var(--muted); }
.start-quiz-btn {
  width: 100%;
  background: var(--text);
  border: none;
  border-radius: var(--radius);
  font-family: 'DM Sans', sans-serif;
  font-size: .9rem;
  font-weight: 600;
  color: #fff;
  padding: 14px;
  cursor: pointer;
  transition: opacity .15s;
  letter-spacing: .02em;
}
.start-quiz-btn:active { opacity: .8; }

.quiz-topbar { display: flex; gap: 8px; align-items: stretch; margin-bottom: 10px; }
.qtop-box {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  text-align: center;
  min-width: 54px;
}
.qtop-val { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 700; }
.qtop-lbl { font-size: .5rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.qtop-val.green { color: var(--green); }
.qtop-val.red { color: var(--red); }
.qtop-val.urgent { color: var(--red); animation: pulse .6s infinite; }
.timer-box-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.q-progress-bar { height: 3px; background: var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
.q-progress-fill { height: 100%; background: var(--text); border-radius: 10px; transition: width .4s; }
.quiz-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 16px 14px;
  margin-bottom: 10px;
}
.q-cat { font-size: .58rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.q-txt { font-size: .92rem; font-weight: 500; line-height: 1.55; margin-bottom: 16px; color: var(--text); }
.q-opts { display: flex; flex-direction: column; gap: 8px; }
.q-opt {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: .82rem;
  color: var(--text);
  padding: 11px 14px;
  text-align: left;
  cursor: pointer;
  transition: all .15s;
  font-weight: 400;
}
.q-opt:hover:not(:disabled) { border-color: var(--text); background: var(--bg); }

mark { background: #fff0a0; color: #806000; border-radius: 2px; padding: 0 1px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

// ── Streak tracking ───────────────────────────────────────────
function checkStreak() {
  const today = new Date().toDateString();
  if (studyData.lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (studyData.lastDate === yesterday) {
    studyData.streak++;
  } else if (studyData.lastDate !== today) {
    studyData.streak = studyData.lastDate ? (studyData.streak > 0 ? 1 : 1) : 1;
  }
  studyData.lastDate = today;
  studyData.sessions++;
  persist();
}
checkStreak();
function updateStreakUI() {
  document.getElementById('streakCount').textContent = studyData.streak + 'd';
}
updateStreakUI();

function showTab(tab) {
  // Lock admin when navigating away
  if (currentTab === 'admin' && tab !== 'admin') adminUnlocked = false;
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  const sh = document.getElementById('subheader');
  sh.classList.toggle('visible', tab === 'drugs' && showSearch);
  document.getElementById('scrollArea').scrollTop = 0;
  const fns = {home: renderHome, drugs: renderDrugs, flash: renderFlash, quiz: renderQuizMenu, ix: renderIx, saved: renderSaved, admin: renderAdmin};
  (fns[tab] || renderHome)();
}

  showSearch = !showSearch;
  const sh = document.getElementById('subheader');

}

// ── Chips ────────────────────────────────────────────────────
function buildChips() {
  const cr = document.getElementById('chipsRow');
  cr.innerHTML = '';
  const classes = ['All', ...new Set(getAllDrugs().map(d => d.class))].sort((a,b) => a==='All'?-1:a.localeCompare(b));
  classes.forEach(cls => {
    const c = document.createElement('button');
    c.className = 'chip' + (cls === 'All' ? ' active' : '');
    c.textContent = cls;
    c.onclick = () => {
      activeClass = cls === 'All' ? null : cls;
      document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      renderDrugs();
    };
    cr.appendChild(c);
  });
}

function renderDrugs() {
  const all = getAllDrugs();
  const q = searchQ.trim();
  const filtered = all.filter(d => {
    const mc = !activeClass || d.class === activeClass;
    const ms = !q || [d.brand, d.generic, d.class, d.moa, d.indication||'', d.side||'', d.mnemonic||''].some(f => f.toLowerCase().includes(q));
    return mc && ms;
  });

  if (!filtered.length) {
    document.getElementById('content').innerHTML = `<div class="empty-state"><div class="es-icon">🔍</div><p>No matches found.<br><span style="font-size:.7rem">Try brand name, generic, class, or MOA keyword</span></p></div>`;
    return;
  }

  document.getElementById('content').innerHTML = filtered.map((d, i) => {
    const idx = all.indexOf(d);
    const isCustom = idx >= DRUGS.length;
    const bm = bookmarks.includes(idx);
    const open = expandedSet.has(idx);
    const note = notes[idx] || '';
    return `
    <div class="drug-card${bm?' bookmarked':''}${isCustom?' custom':''}" id="dc-${idx}" style="animation-delay:${Math.min(i,16)*16}ms">
      <div class="dc-header" onclick="toggleCard(${idx})">
        <div class="dc-row1">
          <div class="dc-brand">${hl(d.brand,q)}</div>
          <div class="dc-actions">
            ${isCustom?`<button class="icon-btn" onclick="event.stopPropagation();editDrug(${idx-DRUGS.length})" title="Edit">✏️</button>`:''}
            <button class="icon-btn${bm?' active':''}" onclick="event.stopPropagation();toggleBm(${idx})" title="Bookmark">⭐</button>
          </div>
        </div>
        <div class="dc-generic">${hl(d.generic,q)}</div>
        <div class="dc-tags">
          <span class="tag tag-class">${hl(d.class,q)}</span>
          ${isCustom?`<span class="tag tag-custom">custom</span>`:''}
        </div>
        <div class="dc-chevron">${open?'▲':'▼'}</div>
      </div>
      <div class="dc-body${open?' open':''}" id="body-${idx}">
        <div class="dc-section"><span class="dc-lbl">MOA</span><span class="dc-val moa">${hl(d.moa,q)}</span></div>
        <div class="dc-section"><span class="dc-lbl">Use</span><span class="dc-val ind">${hl(d.indication||'—',q)}</span></div>
        <div class="dc-section"><span class="dc-lbl">ADRs</span><span class="dc-val adr">${hl(d.side||'—',q)}</span></div>
        ${d.dose?`<div class="dc-section"><span class="dc-lbl">Dose</span><span class="dc-val dose">${hl(d.dose,q)}</span></div>`:''}
        ${d.renal?`<div class="dc-section"><span class="dc-lbl">Renal</span><span class="dc-val dose" style="color:var(--orange)">${hl(d.renal,q)}</span></div>`:''}
        ${d.mnemonic?`<div class="dc-section"><span class="dc-lbl">💡 Tip</span><span class="dc-val mem">${hl(d.mnemonic,q)}</span></div>`:''}
        <div class="dc-footer">
          <textarea class="dc-note" placeholder="📝 Add personal study note…" onchange="saveNote(${idx},this.value)">${note}</textarea>
          <div class="note-status" id="ns-${idx}"></div>
          <div class="dc-btns">
            <button class="dc-btn" onclick="copyDrug(${idx},this)">⎘ Copy</button>
            <button class="dc-btn" onclick="copyField('${(d.moa||'').replace(/'/g,"\\'")}',this)">⎘ MOA</button>
            <button class="dc-btn" onclick="copyField('${(d.mnemonic||d.side||'').replace(/'/g,"\\'")}',this)">⎘ Tip</button>
            ${isCustom?`<button class="dc-btn danger" onclick="promptDel(${idx-DRUGS.length})">🗑</button>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(idx) {
  expandedSet.has(idx) ? expandedSet.delete(idx) : expandedSet.add(idx);
  if (!document.getElementById('dc-'+idx)) { renderDrugs(); return; }
  document.getElementById('body-'+idx).classList.toggle('open', expandedSet.has(idx));
  document.querySelector(`#dc-${idx} .dc-chevron`).textContent = expandedSet.has(idx)?'▲':'▼';
  if (!studyData.viewed.includes(idx)) { studyData.viewed.push(idx); persist(); }
}

function hl(text, q) {
  if (!q || !text) return text||'';
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
}

// ── Bookmarks ─────────────────────────────────────────────────
function toggleBm(idx) {
  bookmarks.includes(idx) ? (bookmarks = bookmarks.filter(i=>i!==idx)) : bookmarks.push(idx);
  persist(); updateBmBadge();
  const card = document.getElementById('dc-'+idx);
  if (card) {
    card.classList.toggle('bookmarked', bookmarks.includes(idx));
    const btn = card.querySelector('.icon-btn:last-child');
    if (btn) btn.classList.toggle('active', bookmarks.includes(idx));
  }
  if (currentTab === 'saved') renderSaved();
}
function updateBmBadge() {
  const b = document.getElementById('bmBadge');
  b.textContent = bookmarks.length;
  b.classList.toggle('show', bookmarks.length > 0);
}
function renderSaved() {
  const all = getAllDrugs();
  if (!bookmarks.length) { document.getElementById('content').innerHTML = `<div class="empty-state"><div class="es-icon">⭐</div><p>No bookmarks yet.<br>Tap ⭐ on any drug card.</p></div>`; return; }
  document.getElementById('content').innerHTML = bookmarks.map(idx => {
    const d = all[idx]; if (!d) return '';
    return `<div class="bm-card" onclick="goToDrug(${idx})">
      <div>
        <div class="bm-brand">${d.brand}</div>
        <div class="bm-generic">${d.generic}</div>
        <div class="bm-class">${d.class}</div>
      </div>
      <button class="bm-remove" onclick="event.stopPropagation();toggleBm(${idx})">✕ Remove</button>
    </div>`;
  }).join('');
}

// ── Notes ─────────────────────────────────────────────────────
function saveNote(idx, val) {
  notes[idx] = val.trim(); persist();
  const m = document.getElementById('ns-'+idx);
  if (m) { m.textContent = '✓ Saved'; setTimeout(() => m.textContent='', 2000); }
}

// ── Copy ──────────────────────────────────────────────────────
function copyDrug(idx, btn) {
  const d = getAllDrugs()[idx];
  const t = `${d.brand} (${d.generic})\nClass: ${d.class}\nMOA: ${d.moa}\nIndication: ${d.indication||''}\nADRs: ${d.side||''}\nDose: ${d.dose||''}\nRenal: ${d.renal||''}\nMnemonic: ${d.mnemonic||''}`;
  doCopy(t, btn, '⎘ Copy');
}
function copyField(text, btn) { doCopy(text, btn, '⎘ Copied'); }
function doCopy(text, btn, orig) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Done!'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('ok'); }, 2000);
  });
}

let fDeck=[], fIdx=0, fFlipped=false, fMode='brand', fGot=0, fSkip=0;

function renderFlash() {
  fDeck = [...getAllDrugs()].sort(() => Math.random()-.5);
  fIdx=0; fFlipped=false; fGot=0; fSkip=0;
  showFlash();
}

function showFlash() {
  const d = fDeck[fIdx % fDeck.length];
  if (!d) return;
  const modes = {
    brand: { front: d.brand, frontLbl: 'Brand Name', back: `<div class="flash-back-generic">${d.generic}</div><div class="flash-back">${d.moa}</div>`, backLbl: 'Generic + MOA' },
    class: { front: d.generic, frontLbl: 'Generic Name', back: `<div class="flash-back" style="font-size:1.1rem;font-weight:600">${d.class}</div><div class="flash-back" style="font-size:.75rem;opacity:.8;margin-top:6px">${d.brand}</div>`, backLbl: 'Drug Class' },
    mnem:  { front: d.mnemonic ? d.mnemonic.split('—')[0].trim() : d.indication, frontLbl: 'Memory Hook / Indication', back: `<div class="flash-back-generic">${d.brand} · ${d.generic}</div><div class="flash-back">${d.moa}</div>`, backLbl: 'Drug + MOA' },
    dose:  { front: d.generic, frontLbl: 'Generic Name', back: `<div class="flash-back" style="font-size:.82rem;">${d.dose||'No dose info'}</div>${d.renal?`<div class="flash-back" style="font-size:.72rem;opacity:.7;margin-top:6px">⚠ Renal: ${d.renal}</div>`:''}`, backLbl: 'Dose + Renal' },
  };
  const m = modes[fMode] || modes.brand;
  const prog = Math.round((fIdx / fDeck.length) * 100);

  document.getElementById('content').innerHTML = `
    <div class="flash-wrap">
      <div class="flash-mode-btns">
        <button class="fmode-btn${fMode==='brand'?' active':''}" onclick="setFMode('brand')">Brand→MOA</button>
        <button class="fmode-btn${fMode==='class'?' active':''}" onclick="setFMode('class')">Generic→Class</button>
        <button class="fmode-btn${fMode==='mnem'?' active':''}" onclick="setFMode('mnem')">Mnemonic</button>
        <button class="fmode-btn${fMode==='dose'?' active':''}" onclick="setFMode('dose')">Dose+Renal</button>
      </div>
      <div class="flash-progress-bar"><div class="flash-progress-fill" style="width:${prog}%"></div></div>
      <div class="flash-counter">${fIdx+1} / ${fDeck.length}</div>
      <div class="flash-card${fFlipped?' flipped':''}" onclick="flipFlash()">
        <div class="flash-side-lbl">${fFlipped ? m.backLbl : m.frontLbl}</div>
        ${fFlipped ? m.back : `<div class="flash-front">${m.front}</div>`}
        <div class="flash-hint-txt">${fFlipped ? 'Tap to flip back' : 'Tap to reveal →'}</div>
      </div>
      <div class="flash-nav">
        <button class="flash-nav-btn skip" onclick="fSkipCard()">⟳ Skip</button>
        <button class="flash-nav-btn${fFlipped?' correct':' primary'}" onclick="fGotIt()">
          ${fFlipped ? '✓ Got it' : 'Flip →'}
        </button>
      </div>
      <div class="flash-scores">
        <div class="fs-box"><div class="fv" style="color:var(--green)">${fGot}</div><div class="fl">Got it</div></div>
        <div class="fs-box"><div class="fv" style="color:var(--muted)">${fSkip}</div><div class="fl">Skipped</div></div>
        <div class="fs-box"><div class="fv">${fDeck.length}</div><div class="fl">Cards</div></div>
      </div>
    </div>`;
}

function flipFlash() { fFlipped = !fFlipped; showFlash(); }
function fGotIt() { if (!fFlipped) { fFlipped = true; showFlash(); return; } fGot++; fFlipped=false; fIdx=(fIdx+1)%fDeck.length; showFlash(); }
function fSkipCard() { fSkip++; fFlipped=false; fIdx=(fIdx+1)%fDeck.length; showFlash(); }
function setFMode(m) { fMode=m; fFlipped=false; showFlash(); }

      <button class="start-quiz-btn" onclick="startQuiz()">Start Quiz →</button>
      ${studyData.totalQ>0?`
      <div style="margin-top:14px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;">
        <div style="font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;">Your Stats</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;">
          <div><div style="font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700">${studyData.totalQ}</div><div style="font-size:.6rem;color:var(--muted)">Total Qs</div></div>
          <div><div style="font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700;color:var(--green)">${Math.round(studyData.totalCorrect/studyData.totalQ*100)}%</div><div style="font-size:.6rem;color:var(--muted)">Accuracy</div></div>
          <div><div style="font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700">${studyData.sessions}</div><div style="font-size:.6rem;color:var(--muted)">Sessions</div></div>
        </div>
      </div>`:''}`
  ;
}

function setQMode(m) { qMode=m; renderQuizMenu(); }

function startQuiz() {
  qQueue = [...QUIZ].sort(() => Math.random()-.5);
  qIdx=0; qCorrect=0; qWrong=0; qAnswered=false;
  if (qTimer) clearInterval(qTimer);
  renderQ();
}

function renderQ() {
  if (qIdx >= qQueue.length) { showQuizDone(); return; }
  const q = qQueue[qIdx];
  const shuffled = q.opts.map((o,i) => ({t:o,o:i})).sort(() => Math.random()-.5);
  const corrIdx = shuffled.findIndex(s => s.o === q.c);
  const prog = Math.round((qIdx/qQueue.length)*100);
  if (qMode==='timed') { qTimeLeft=30; if(qTimer) clearInterval(qTimer); startTimer(corrIdx); }

  document.getElementById('content').innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-topbar">
        <div class="qtop-box"><div class="qtop-val green">${qCorrect}</div><div class="qtop-lbl">Correct</div></div>
        ${qMode==='timed'
          ? `<div class="qtop-box timer-box-main" style="flex:1"><div class="qtop-val" id="timerVal">${qTimeLeft}</div><div class="qtop-lbl">seconds</div></div>`
          : `<div class="qtop-box" style="flex:1"><div class="qtop-val" style="font-size:.9rem">Q${qIdx+1}/${qQueue.length}</div><div class="qtop-lbl">Progress</div></div>`}
        <div class="qtop-box"><div class="qtop-val red">${qWrong}</div><div class="qtop-lbl">Wrong</div></div>
      </div>
      <div class="q-progress-bar"><div class="q-progress-fill" style="width:${prog}%"></div></div>
      <div class="quiz-card">
        <div class="q-cat">Question ${qIdx+1} of ${qQueue.length}</div>
        <div class="q-txt">${q.q}</div>
        <div class="q-opts">
          ${shuffled.map((s,i)=>`<button class="q-opt" id="qo${i}" onclick="answerQ(${i},${corrIdx},'${escQ(q.exp)}')">${s.t}</button>`).join('')}
        </div>
        <div class="q-feedback" id="qfb"></div>
        <button class="q-next" id="qnext" onclick="nextQ()">Next Question →</button>
      </div>
    </div>`;
}

function startTimer(corrIdx) {
  qTimer = setInterval(() => {
    qTimeLeft--;
    const tv = document.getElementById('timerVal');
    if (tv) { tv.textContent = qTimeLeft; tv.className = 'qtop-val' + (qTimeLeft<=10?' urgent':''); }
    if (qTimeLeft <= 0) { clearInterval(qTimer); autoFail(corrIdx); }
  }, 1000);
}

function autoFail(corrIdx) {
  if (qAnswered) return; qAnswered=true; qWrong++;
  document.querySelectorAll('.q-opt').forEach((b,i) => { b.disabled=true; if(i===corrIdx) b.classList.add('correct'); });
  const fb = document.getElementById('qfb'); fb.className='q-feedback show bad'; fb.innerHTML=`⏱ Time's up! — ${qQueue[qIdx].exp}`;
  document.getElementById('qnext').classList.add('show');
}

function answerQ(chosen, correct, exp) {
  if (qAnswered) return; qAnswered=true; if(qTimer) clearInterval(qTimer);
  document.querySelectorAll('.q-opt').forEach((b,i) => { b.disabled=true; if(i===correct) b.classList.add('correct'); if(i===chosen&&chosen!==correct) b.classList.add('wrong'); });
  const fb = document.getElementById('qfb');
  if (chosen===correct) { qCorrect++; fb.className='q-feedback show ok'; fb.innerHTML=`✓ Correct! — ${exp}`; }
  else { qWrong++; fb.className='q-feedback show bad'; fb.innerHTML=`✗ Incorrect. — ${exp}`; }
  document.getElementById('qnext').classList.add('show');
}

function nextQ() { qIdx++; qAnswered=false; renderQ(); }
function escQ(s) { return (s||'').replace(/'/g,"\\'").replace(/\n/g,' '); }

function showQuizDone() {
  if(qTimer) clearInterval(qTimer);
  studyData.totalQ += qQueue.length; studyData.totalCorrect += qCorrect; persist();
  const pct = Math.round(qCorrect/qQueue.length*100);
  const grade = pct>=90?'🏆':pct>=75?'📚':pct>=55?'💪':'📖';
  const msg = pct>=90?'Outstanding! Exam-ready performance.':pct>=75?'Strong result — review the ones you missed.':pct>=55?'Good effort — keep practising daily.':'Review the drug library and try again.';
  document.getElementById('content').innerHTML = `
    <div class="quiz-wrap"><div class="quiz-done-wrap">
      <div class="done-circle">${pct}%</div>
      <h2>${grade} ${pct>=90?'Excellent!':pct>=75?'Well done!':'Keep going!'}</h2>
      <p>${qCorrect} of ${qQueue.length} correct<br>${msg}</p>
      <div>
        <button class="done-btn" onclick="startQuiz()">Retry Quiz</button>
        <button class="done-btn outline" onclick="renderQuizMenu()">← Menu</button>
      </div>
    </div></div>`;
}

// ══════════════════════════════════════════════════════════════
let ixInputs = ['', ''];

function renderIx() {
  document.getElementById('content').innerHTML = `
    <div class="ix-wrap">
      <div class="ix-title">⚡ Drug Interaction Checker</div>
      <p class="ix-sub">Enter drug names (brand or generic) to check for known interactions. ${INTERACTIONS.length} interactions in database.</p>
      <div class="ix-inputs" id="ixInputs">
        ${ixInputs.map((v,i)=>`
          <div class="ix-input-row">
            <input class="ix-input" placeholder="Drug ${i+1} (e.g. warfarin, aspirin…)" value="${v}" oninput="ixInputs[${i}]=this.value">
            ${i>=2?`<button class="ix-remove" onclick="removeIxInput(${i})">✕</button>`:'<div style="width:30px"></div>'}
          </div>`).join('')}
      </div>
      <button class="add-drug-input-btn" onclick="addIxInput()">+ Add another drug</button>
      <button class="check-ix-btn" onclick="checkInteractions()">Check Interactions</button>
      <div id="ixResults"></div>
    </div>`;
}

function addIxInput() { ixInputs.push(''); renderIx(); }
function removeIxInput(i) { ixInputs.splice(i,1); renderIx(); }

function checkInteractions() {
  const drugs = ixInputs.map(v => v.trim().toLowerCase()).filter(Boolean);
  if (drugs.length < 2) { document.getElementById('ixResults').innerHTML = `<p style="font-size:.78rem;color:var(--red)">Please enter at least 2 drugs to check.</p>`; return; }
  const results = [];
  for (let i = 0; i < drugs.length; i++) {
    for (let j = i+1; j < drugs.length; j++) {
      const da = drugs[i], db = drugs[j];
      const found = INTERACTIONS.filter(ix => {
        const matchA = da.includes(ix.a) || ix.a.includes(da.split(' ')[0]);
        const matchB = db.includes(ix.b) || ix.b.includes(db.split(' ')[0]);
        const matchAB = da.includes(ix.b) || ix.b.includes(da.split(' ')[0]);
        const matchBA = db.includes(ix.a) || ix.a.includes(db.split(' ')[0]);
        return (matchA && matchB) || (matchAB && matchBA);
      });
      if (found.length) { found.forEach(f => results.push({pair:[drugs[i],drugs[j]],ix:f})); }
      else {
        // Check for class-level interactions
        const classMatch = INTERACTIONS.filter(ix => {
          const terms = [da,db];
          return terms.some(t => t.includes(ix.a.split(' ')[0])) && terms.some(t => t.includes(ix.b.split(' ')[0]));
        });
        if (!classMatch.length) results.push({pair:[drugs[i],drugs[j]],none:true});
      }
    }
  }
  const sevOrder = {major:0,moderate:1,minor:2,none:3};
  results.sort((a,b) => sevOrder[a.ix?.severity||'none'] - sevOrder[b.ix?.severity||'none']);

  document.getElementById('ixResults').innerHTML = results.map(r => {
    if (r.none) return `<div class="ix-result-card">
      <div class="ix-pair">${r.pair[0]} + ${r.pair[1]}</div>
      <span class="ix-severity none">✓ No known interaction</span>
      <div class="ix-desc">No significant interaction found in this database. Always cross-check with additional study references.</div>
    </div>`;
    return `<div class="ix-result-card">
      <div class="ix-pair">${r.pair[0]} + ${r.pair[1]}</div>
      <span class="ix-severity ${r.ix.severity}">${r.ix.severity==='major'?'⚠ Major':r.ix.severity==='moderate'?'▲ Moderate':'↓ Minor'}</span>
      <div class="ix-desc">${r.ix.desc}</div>
      <div class="ix-mgmt">📋 Management: ${r.ix.mgmt}</div>
    </div>`;
  }).join('') || `<div class="ix-result-card"><span class="ix-severity none">✓ No interactions found</span><div class="ix-desc">No known interactions in database for these drug combinations.</div></div>`;
}

const ADMIN_PASSWORD = 'RxRef2025';  // ← CHANGE THIS TO YOUR OWN PASSWORD
let adminUnlocked = false;

function renderAdminLock() {
  document.getElementById('content').innerHTML = `
    <div class="admin-lock">
      <div class="lock-icon">🔐</div>
      <h2>Admin Access</h2>
      <p>This area is password protected.<br>Only the app owner can add or edit drugs.</p>

      <div class="admin-lock-err" id="adminErr">❌ Incorrect password. Try again.</div>
      <div class="admin-hint">💡 Contact the app owner for access</div>
    </div>`;
  setTimeout(() => document.getElementById('adminPwInput')?.focus(), 100);
}

function checkAdminPw() {
  const input = document.getElementById('adminPwInput');
  const err = document.getElementById('adminErr');
  if (input.value === ADMIN_PASSWORD) {
    adminUnlocked = true;
    renderAdmin();
  } else {
    input.value = '';
    err.classList.add('show');
    input.style.borderColor = 'var(--red)';
    setTimeout(() => {
      err.classList.remove('show');
      input.style.borderColor = '';
    }, 3000);
  }
}

function renderAdmin(editIdx) {
  if (!adminUnlocked) { renderAdminLock(); return; }
  const isEdit = editIdx !== undefined;
  const d = isEdit ? customDrugs[editIdx] : {};
  const classes = [...new Set(getAllDrugs().map(x=>x.class))].sort();
  document.getElementById('content').innerHTML = `
    <div class="admin-stats">
      <div class="ast"><strong>${DRUGS.length}</strong><span>Built-in</span></div>
      <div class="ast"><strong>${customDrugs.length}</strong><span>Custom</span></div>
      <div class="ast"><strong>${getAllDrugs().length}</strong><span>Total</span></div>
    </div>
    <div class="admin-form">
      <div class="af-title">
        ${isEdit ? '✏️ Edit Drug' : '➕ Add New Drug'}
        ${isEdit ? `<button class="af-cancel" onclick="renderAdmin()">Cancel</button>` : ''}
      </div>
      <div class="af-row-2">
        <div><div class="af-lbl">Brand Name *</div><input class="af-input" id="af-brand" placeholder="e.g. Norvasc" value="${d.brand||''}"></div>
        <div><div class="af-lbl">Generic Name *</div><input class="af-input" id="af-generic" placeholder="e.g. amlodipine" value="${d.generic||''}"></div>
      </div>
      <div class="af-row">
        <div class="af-lbl">Drug Class *</div>
        <select class="af-select" id="af-class"><option value="">— Select existing —</option>${classes.map(c=>`<option value="${c}"${d.class===c?' selected':''}>${c}</option>`).join('')}</select>
        <input class="af-input" id="af-class-new" placeholder="Or type new class…" style="margin-top:6px" value="${d.class&&!classes.includes(d.class)?d.class:''}">
      </div>
      <div class="af-row"><div class="af-lbl">Mechanism of Action *</div><textarea class="af-textarea" id="af-moa" placeholder="e.g. Inhibits HMG-CoA reductase → ↓ cholesterol">${d.moa||''}</textarea></div>
      <div class="af-row"><div class="af-lbl">Indication</div><textarea class="af-textarea" id="af-ind" placeholder="e.g. HTN, Angina">${d.indication||''}</textarea></div>
      <div class="af-row"><div class="af-lbl">Side Effects / ADRs</div><textarea class="af-textarea" id="af-side" placeholder="e.g. Peripheral edema, headache">${d.side||''}</textarea></div>
      <div class="af-row-2">
        <div><div class="af-lbl">Dosing</div><input class="af-input" id="af-dose" placeholder="e.g. 5–10mg OD" value="${d.dose||''}"></div>
        <div><div class="af-lbl">Renal Adjustment</div><input class="af-input" id="af-renal" placeholder="e.g. Avoid CrCl <30" value="${d.renal||''}"></div>
      </div>
      <div class="af-row"><div class="af-lbl">Mnemonic / Memory Tip</div><input class="af-input" id="af-mem" placeholder="e.g. NORVASC = NO real cardiac effect" value="${d.mnemonic||''}"></div>
      <div class="af-error" id="af-err">Please fill in all required (*) fields.</div>
      <button class="af-submit" onclick="${isEdit?`saveDrug(${editIdx})`:'addDrug()'}">${isEdit?'💾 Save Changes':'➕ Add Drug'}</button>
    </div>
    <div class="custom-list-lbl">Custom Drugs (${customDrugs.length})</div>
    ${customDrugs.length ? customDrugs.map((cd,i)=>`
      <div class="cdi">
        <div>
          <div class="cdi-brand">${cd.brand}</div>
          <div class="cdi-generic">${cd.generic}</div>
          <div class="cdi-class">${cd.class}</div>
        </div>
        <div class="cdi-btns">
          <button class="cdi-btn edit" onclick="renderAdmin(${i})">✏️</button>
          <button class="cdi-btn del" onclick="promptDel(${i})">🗑</button>
        </div>
      </div>`).join('') : `<div class="empty-state" style="padding:28px 0"><div class="es-icon">➕</div><p>No custom drugs yet.<br>Use the form above.</p></div>`}
  `;
  if (isEdit) editingIdx = editIdx;
}

function getForm() {
  return {
    brand: document.getElementById('af-brand').value.trim(),
    generic: document.getElementById('af-generic').value.trim(),
    class: (document.getElementById('af-class-new').value.trim() || document.getElementById('af-class').value.trim()),
    moa: document.getElementById('af-moa').value.trim(),
    indication: document.getElementById('af-ind').value.trim(),
    side: document.getElementById('af-side').value.trim(),
    dose: document.getElementById('af-dose').value.trim(),
    renal: document.getElementById('af-renal').value.trim(),
    mnemonic: document.getElementById('af-mem').value.trim(),
  };
}

function addDrug() {
  const d = getForm();
  if (!d.brand||!d.generic||!d.class||!d.moa) { document.getElementById('af-err').classList.add('show'); return; }
  customDrugs.push(d); persist(); buildChips(); renderAdmin();
}

function saveDrug(i) {
  const d = getForm();
  if (!d.brand||!d.generic||!d.class||!d.moa) { document.getElementById('af-err').classList.add('show'); return; }
  customDrugs[i]=d; persist(); buildChips(); renderAdmin();
}

function editDrug(i) { showTab('admin'); setTimeout(() => renderAdmin(i), 50); }

function promptDel(i) {
  pendingDel = i;
  document.getElementById('confirmMsg').textContent = `Delete "${customDrugs[i].brand}" (${customDrugs[i].generic})?`;
  document.getElementById('confirmOverlay').classList.add('open');
}
function confirmDeleteDrug() {
  if (pendingDel === null) return;
  customDrugs.splice(pendingDel,1); pendingDel=null; persist(); buildChips();
  closeOverlay('confirmOverlay');
  if (currentTab==='admin') renderAdmin(); else renderDrugs();
}
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
