<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RxRef Pro">
<meta name="description" content="RxRef Pro — Premium Pharmacy Study App. Drugs, Antidotes, Flashcards, Quiz, Interactions, Clinical Cases.">
<title>RxRef Pro — Pharmacy Study</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   DESIGN: Deep Navy Clinical — Premium
   Plus Jakarta Sans + Lora serif
   Dark mode first, crisp & modern
═══════════════════════════════════════ */
:root {
  --navy: #0b1120;
  --navy2: #111827;
  --navy3: #1e2d45;
  --card: #162032;
  --card2: #1a2840;
  --border: #1f3352;
  --border2: #2a4366;
  --text: #f0f6ff;
  --text2: #94aec8;
  --muted: #4a6a8a;
  --teal: #0ea5e9;
  --teal2: #38bdf8;
  --green: #10b981;
  --green2: #34d399;
  --red: #ef4444;
  --red2: #f87171;
  --yellow: #f59e0b;
  --yellow2: #fbbf24;
  --purple: #8b5cf6;
  --purple2: #a78bfa;
  --orange: #f97316;
  --pink: #ec4899;
  --nav-h: 64px;
  --header-h: 58px;
  --r: 14px;
  --r-sm: 9px;
  --shadow: 0 4px 20px rgba(0,0,0,.3);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.2);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;-webkit-overflow-scrolling:touch;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--navy);color:var(--text);display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden;}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* ══ HEADER ══ */
.app-header{
  height:var(--header-h);flex-shrink:0;
  display:flex;align-items:center;
  padding:0 18px;
  background:var(--navy2);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  gap:12px;
}
.header-inner{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1200px;margin:0 auto;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--teal),var(--purple));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.logo-text{font-family:'Lora',serif;font-size:1.25rem;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.logo-text span{color:var(--teal);}
.header-right{display:flex;align-items:center;gap:8px;}
.streak-badge{display:flex;align-items:center;gap:5px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:20px;padding:5px 11px;font-size:.72rem;font-weight:700;color:var(--yellow2);}
.search-btn{width:36px;height:36px;background:var(--card);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.95rem;color:var(--text2);transition:all .15s;}
.search-btn:hover{border-color:var(--teal);color:var(--teal);}

/* ══ SEARCH BAR ══ */
.search-bar{flex-shrink:0;background:var(--navy2);border-bottom:1px solid var(--border);padding:10px 18px;display:none;}
.search-bar.open{display:block;}
.search-inner{max-width:1200px;margin:0 auto;}
.search-input-wrap{position:relative;}
.search-input-wrap input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;color:var(--text);padding:10px 14px 10px 38px;outline:none;transition:border-color .15s;}
.search-input-wrap input:focus{border-color:var(--teal);}
.search-input-wrap input::placeholder{color:var(--muted);}
.s-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none;}
.chips-wrap{display:flex;gap:6px;padding:8px 0 2px;overflow-x:auto;scrollbar-width:none;}
.chips-wrap::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);color:var(--muted);background:var(--card);cursor:pointer;transition:all .15s;white-space:nowrap;}
.chip:hover{border-color:var(--teal2);color:var(--teal2);}
.chip.active{background:var(--teal);border-color:var(--teal);color:#fff;}

/* ══ SCROLL AREA ══ */
.scroll-area{flex:1;overflow-y:auto;padding:16px 18px 90px;}
#content{max-width:1200px;margin:0 auto;}

/* ══ BOTTOM NAV ══ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--nav-h);
  background:var(--navy2);
  border-top:1px solid var(--border);
  display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;cursor:pointer;
  border:none;background:none;
  position:relative;transition:all .15s;
}
.nav-item:active{background:rgba(14,165,233,.06);}
.nav-icon{font-size:1.15rem;line-height:1;transition:transform .2s;}
.nav-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:.5rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);transition:color .15s;}
.nav-item.active .nav-label{color:var(--teal);}
.nav-item.active .nav-icon{transform:scale(1.1);}
.nav-item.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2.5px;background:linear-gradient(90deg,var(--teal),var(--purple));border-radius:0 0 4px 4px;}
.bm-dot{position:absolute;top:8px;right:calc(50% - 16px);width:8px;height:8px;background:var(--yellow);border-radius:50%;border:2px solid var(--navy2);display:none;}
.bm-dot.show{display:block;}

/* ══ DASHBOARD ══ */
.greeting{font-family:'Lora',serif;font-size:1.6rem;font-weight:700;margin-bottom:4px;line-height:1.2;}
.greeting-sub{font-size:.8rem;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center;}
.stat-box.featured{background:linear-gradient(135deg,#0c2a4a,#0a3d6b);border-color:rgba(14,165,233,.3);}
.stat-val{font-family:'Lora',serif;font-size:1.7rem;font-weight:700;line-height:1;color:var(--text);margin-bottom:4px;}
.stat-box.featured .stat-val{color:var(--teal2);}
.stat-lbl{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:6px;}
.section-hdr h3{font-family:'Lora',serif;font-size:1rem;font-weight:700;}
.section-hdr span{font-size:.7rem;color:var(--teal);cursor:pointer;font-weight:600;}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.quick-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;}
.quick-btn:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow-sm);}
.quick-btn:active{transform:scale(.97);}
.qb-icon{font-size:1.4rem;}
.qb-label{font-size:.65rem;font-weight:700;color:var(--text2);letter-spacing:.04em;}
.streak-card{background:linear-gradient(135deg,#1a1200,#2a1f00);border:1px solid rgba(245,158,11,.25);border-radius:var(--r);padding:16px;margin-bottom:18px;}
.streak-title{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--yellow2);margin-bottom:10px;}
.streak-days{display:flex;gap:5px;}
.sd{flex:1;height:32px;border-radius:6px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:700;color:var(--muted);text-transform:uppercase;}
.sd.done{background:rgba(245,158,11,.2);border-color:rgba(245,158,11,.4);color:var(--yellow2);}
.sd.today{border-color:var(--yellow);color:var(--yellow);}
.recent-list{display:flex;flex-direction:column;gap:8px;}
.recent-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .15s;}
.recent-item:hover{border-color:var(--border2);}
.ri-name{font-weight:700;font-size:.88rem;}
.ri-gen{font-size:.7rem;color:var(--teal2);margin-top:1px;}
.ri-class{font-size:.62rem;color:var(--muted);}

/* ══ DRUG CARDS ══ */
.drug-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .2s,box-shadow .2s;animation:slideUp .2s ease both;}
.drug-card:hover{border-color:var(--border2);box-shadow:var(--shadow-sm);}
.drug-card.bookmarked{border-color:rgba(245,158,11,.4);}
.drug-card.custom{border-left:3px solid var(--purple);}
.dc-head{padding:14px 16px 10px;cursor:pointer;user-select:none;}
.dc-row1{display:flex;justify-content:space-between;align-items:flex-start;}
.dc-brand{font-family:'Lora',serif;font-size:1.1rem;font-weight:700;color:var(--text);line-height:1.2;}
.dc-acts{display:flex;gap:4px;align-items:center;flex-shrink:0;}
.iBtn{background:none;border:none;cursor:pointer;font-size:.95rem;padding:2px;opacity:.35;transition:opacity .15s,transform .15s;line-height:1;}
.iBtn:hover,.iBtn.on{opacity:1;}
.iBtn:active{transform:scale(1.2);}
.dc-gen{font-size:.72rem;color:var(--teal2);margin-top:3px;font-weight:500;}
.dc-tags{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.tag{font-size:.55rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;border:1px solid;}
.tag-cls{background:rgba(255,255,255,.05);border-color:var(--border2);color:var(--text2);}
.tag-cst{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.3);color:var(--purple2);}
.dc-chev{font-size:.62rem;color:var(--muted);margin-top:5px;text-align:right;}
.dc-body{display:none;border-top:1px solid var(--border);}
.dc-body.open{display:block;}
.dc-row{display:flex;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:.78rem;line-height:1.6;}
.dc-row:last-of-type{border-bottom:none;}
.dc-lbl{font-size:.55rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);min-width:48px;flex-shrink:0;padding-top:2px;}
.dc-val{flex:1;color:var(--text2);}
.dc-val.moa{color:#7dd3fc;}
.dc-val.ind{color:var(--green2);}
.dc-val.adr{color:#fb923c;}
.dc-val.dose{color:var(--purple2);}
.dc-val.mem{color:var(--text2);font-style:italic;}
.dc-footer{padding:10px 16px 14px;border-top:1px solid var(--border);background:rgba(0,0,0,.15);}
.dc-note{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;color:var(--text);padding:8px 11px;resize:none;min-height:52px;outline:none;transition:border-color .15s;margin-bottom:8px;}
.dc-note:focus{border-color:var(--teal);}
.dc-note::placeholder{color:var(--muted);}
.note-ok{font-size:.58rem;color:var(--green2);text-align:right;height:12px;margin-bottom:6px;}
.dc-btns{display:flex;gap:7px;flex-wrap:wrap;}
.dc-btn{flex:1;min-width:64px;background:var(--navy3);border:1px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.62rem;font-weight:600;color:var(--text2);padding:7px 5px;cursor:pointer;text-align:center;transition:all .15s;}
.dc-btn:hover{border-color:var(--teal);color:var(--teal);}
.dc-btn.ok{border-color:var(--green);color:var(--green);}
.dc-btn.del:hover{border-color:var(--red);color:var(--red);}

/* ══ ANTIDOTES ══ */
.antidote-search{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;color:var(--text);padding:11px 14px;outline:none;margin-bottom:14px;transition:border-color .15s;}
.antidote-search:focus{border-color:var(--teal);}
.antidote-search::placeholder{color:var(--muted);}
.antidote-group{margin-bottom:20px;}
.ag-title{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-left:2px;display:flex;align-items:center;gap:6px;}
.ag-title::after{content:'';flex:1;height:1px;background:var(--border);}
.antidote-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:13px 16px;margin-bottom:7px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;transition:border-color .15s;}
.antidote-card:hover{border-color:var(--border2);}
.ac-drug{font-weight:700;font-size:.88rem;color:var(--red2);}
.ac-drug-sub{font-size:.68rem;color:var(--muted);margin-top:2px;}
.ac-arrow{font-size:1.1rem;color:var(--border2);text-align:center;}
.ac-antidote{font-weight:700;font-size:.88rem;color:var(--green2);text-align:right;}
.ac-antidote-sub{font-size:.68rem;color:var(--muted);margin-top:2px;text-align:right;}
.ac-severity{display:inline-block;font-size:.52rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:10px;margin-top:5px;}
.sev-high{background:rgba(239,68,68,.12);color:var(--red2);border:1px solid rgba(239,68,68,.25);}
.sev-mod{background:rgba(245,158,11,.12);color:var(--yellow2);border:1px solid rgba(245,158,11,.25);}
.sev-low{background:rgba(16,185,129,.12);color:var(--green2);border:1px solid rgba(16,185,129,.25);}

/* ══ FLASHCARDS ══ */
.flash-wrap{max-width:560px;margin:0 auto;}
.flash-modes{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.fm-btn{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.04em;color:var(--text2);padding:9px 6px;cursor:pointer;text-align:center;transition:all .15s;}
.fm-btn.active{background:linear-gradient(135deg,var(--teal),var(--purple));border-color:transparent;color:#fff;}
.flash-prog-bar{height:3px;background:var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden;}
.flash-prog-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--purple));border-radius:10px;transition:width .4s ease;}
.flash-counter{font-size:.68rem;color:var(--muted);text-align:center;margin-bottom:10px;font-weight:600;}
.flash-card{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:18px;min-height:220px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 24px;cursor:pointer;text-align:center;
  position:relative;margin-bottom:12px;
  transition:all .25s;user-select:none;
}
.flash-card:hover{box-shadow:var(--shadow);}
.flash-card:active{transform:scale(.98);}
.flash-card.flipped{background:linear-gradient(135deg,#0a2540,#0d3060);border-color:rgba(14,165,233,.3);}
.flash-side-lbl{position:absolute;top:13px;left:16px;font-size:.52rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.flash-card.flipped .flash-side-lbl{color:rgba(14,165,233,.5);}
.flash-front{font-family:'Lora',serif;font-size:1.45rem;font-weight:700;color:var(--text);}
.flash-back{font-size:.82rem;color:var(--text2);line-height:1.65;}
.flash-back-top{font-size:.75rem;color:var(--teal2);margin-bottom:6px;font-weight:600;}
.flash-hint{font-size:.62rem;color:var(--muted);margin-top:14px;}
.flash-card.flipped .flash-hint{color:rgba(14,165,233,.35);}
.flash-nav{display:flex;gap:8px;margin-bottom:14px;}
.flash-nav-btn{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;font-weight:600;color:var(--text2);padding:11px;cursor:pointer;transition:all .15s;text-align:center;}
.flash-nav-btn:hover{border-color:var(--teal2);}
.flash-nav-btn.go{background:linear-gradient(135deg,var(--teal),var(--purple));border-color:transparent;color:#fff;}
.flash-nav-btn.got{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.3);color:var(--green2);}
.flash-scores{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.fs-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;text-align:center;}
.fs-val{font-family:'Lora',serif;font-size:1.3rem;font-weight:700;}
.fs-lbl{font-size:.55rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}

/* ══ QUIZ ══ */
.quiz-wrap{max-width:580px;margin:0 auto;}
.quiz-menu-top{text-align:center;padding:8px 0 20px;}
.quiz-menu-top h2{font-family:'Lora',serif;font-size:1.6rem;font-weight:700;margin-bottom:6px;}
.quiz-menu-top p{font-size:.78rem;color:var(--text2);line-height:1.6;}
.quiz-mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.qm-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .15s;text-align:center;}
.qm-card:hover{border-color:var(--border2);}
.qm-card.active{background:linear-gradient(135deg,#0a2540,#0d1f50);border-color:rgba(14,165,233,.35);}
.qm-icon{font-size:1.6rem;margin-bottom:8px;}
.qm-name{font-weight:700;font-size:.85rem;color:var(--text);margin-bottom:3px;}
.qm-desc{font-size:.65rem;color:var(--muted);}
.start-btn{width:100%;background:linear-gradient(135deg,var(--teal),var(--purple));border:none;border-radius:var(--r);font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;font-weight:700;color:#fff;padding:14px;cursor:pointer;letter-spacing:.02em;transition:opacity .15s;}
.start-btn:active{opacity:.85;}
.quiz-topbar{display:flex;gap:8px;margin-bottom:10px;}
.qtb{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;text-align:center;min-width:52px;}
.qtb-val{font-family:'Lora',serif;font-size:1.2rem;font-weight:700;}
.qtb-lbl{font-size:.48rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.qtb-val.g{color:var(--green2);}
.qtb-val.r{color:var(--red2);}
.qtb-val.urgent{color:var(--red2);animation:pulse .6s infinite;}
.qtb-mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.qpbar{height:3px;background:var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.qpfill{height:100%;background:linear-gradient(90deg,var(--teal),var(--purple));border-radius:10px;transition:width .4s;}
.quiz-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px 14px;margin-bottom:10px;}
.q-cat{font-size:.55rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal2);margin-bottom:8px;}
.q-txt{font-size:.92rem;font-weight:600;line-height:1.55;margin-bottom:16px;color:var(--text);}
.q-opts{display:flex;flex-direction:column;gap:8px;}
.q-opt{background:var(--navy3);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;color:var(--text);padding:11px 14px;text-align:left;cursor:pointer;transition:all .15s;font-weight:500;}
.q-opt:hover:not(:disabled){border-color:var(--teal);color:var(--teal);}
.q-opt.correct{background:rgba(16,185,129,.1);border-color:var(--green);color:var(--green2);}
.q-opt.wrong{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red2);}
.q-opt:disabled{cursor:default;}
.q-fb{margin-top:10px;padding:10px 13px;border-radius:var(--r-sm);font-size:.74rem;line-height:1.6;display:none;}
.q-fb.show{display:block;}
.q-fb.ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);color:var(--green2);}
.q-fb.bad{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--red2);}
.q-next{width:100%;background:linear-gradient(135deg,var(--teal),var(--purple));border:none;border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;color:#fff;padding:12px;margin-top:10px;cursor:pointer;display:none;}
.q-next.show{display:block;}
.quiz-done{text-align:center;padding:20px 10px;}
.done-ring{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--purple));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'Lora',serif;font-size:1.9rem;font-weight:700;color:#fff;}
.quiz-done h2{font-family:'Lora',serif;font-size:1.5rem;font-weight:700;margin-bottom:8px;}
.quiz-done p{font-size:.8rem;color:var(--text2);line-height:1.7;margin-bottom:20px;}
.done-btns{display:flex;gap:10px;justify-content:center;}
.done-btn{background:linear-gradient(135deg,var(--teal),var(--purple));border:none;border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;color:#fff;padding:11px 24px;cursor:pointer;}
.done-btn.out{background:none;border:1.5px solid var(--border);color:var(--text2);}

/* ══ INTERACTIONS ══ */
.ix-wrap{max-width:580px;margin:0 auto;}
.ix-title{font-family:'Lora',serif;font-size:1.25rem;font-weight:700;margin-bottom:5px;}
.ix-sub{font-size:.75rem;color:var(--text2);line-height:1.6;margin-bottom:16px;}
.ix-search-box{position:relative;margin-bottom:10px;}
.ix-search-box input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;color:var(--text);padding:11px 14px;outline:none;transition:border-color .15s;}
.ix-search-box input:focus{border-color:var(--teal);}
.ix-search-box input::placeholder{color:var(--muted);}
.ix-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--card2);border:1.5px solid var(--border2);border-top:none;border-radius:0 0 var(--r-sm) var(--r-sm);z-index:50;max-height:200px;overflow-y:auto;display:none;box-shadow:var(--shadow);}
.ix-dropdown.open{display:block;}
.ix-sug{padding:10px 14px;font-size:.82rem;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.ix-sug:last-child{border-bottom:none;}
.ix-sug:hover{background:var(--navy3);}
.ix-sug-name{font-weight:600;color:var(--text);}
.ix-sug-class{font-size:.65rem;color:var(--muted);}
.selected-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:20px;}
.sel-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(14,165,233,.12);border:1px solid rgba(14,165,233,.25);color:var(--teal2);font-size:.72rem;font-weight:600;padding:5px 10px;border-radius:20px;}
.sel-pill button{background:none;border:none;color:rgba(14,165,233,.6);cursor:pointer;font-size:.75rem;padding:0;line-height:1;transition:color .15s;}
.sel-pill button:hover{color:var(--red2);}
.check-btn{width:100%;background:linear-gradient(135deg,var(--teal),var(--purple));border:none;border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;font-weight:700;color:#fff;padding:12px;cursor:pointer;margin-bottom:16px;transition:opacity .15s;}
.check-btn:active{opacity:.85;}
.ix-result{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;animation:slideUp .2s ease both;}
.ix-pair-lbl{font-size:.7rem;color:var(--muted);margin-bottom:6px;font-weight:600;}
.ix-sev{display:inline-flex;align-items:center;gap:5px;font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:8px;}
.ix-sev.major{background:rgba(239,68,68,.1);color:var(--red2);border:1px solid rgba(239,68,68,.25);}
.ix-sev.moderate{background:rgba(245,158,11,.1);color:var(--yellow2);border:1px solid rgba(245,158,11,.25);}
.ix-sev.minor{background:rgba(16,185,129,.1);color:var(--green2);border:1px solid rgba(16,185,129,.25);}
.ix-sev.none{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border);}
.ix-desc{font-size:.78rem;color:var(--text2);line-height:1.6;}
.ix-mgmt{font-size:.72rem;color:#7dd3fc;margin-top:6px;line-height:1.55;}

/* ══ ABBREVIATIONS ══ */
.abbr-wrap{max-width:900px;margin:0 auto;}
.abbr-search{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;color:var(--text);padding:11px 14px;outline:none;margin-bottom:12px;transition:border-color .15s;}
.abbr-search:focus{border-color:var(--teal);}
.abbr-search::placeholder{color:var(--muted);}
.abbr-cats{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;}
.abbr-cat{background:var(--card);border:1.5px solid var(--border);border-radius:20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:5px 13px;cursor:pointer;transition:all .15s;}
.abbr-cat:hover{border-color:var(--teal2);color:var(--teal2);}
.abbr-cat.active{background:linear-gradient(135deg,var(--teal),var(--purple));border-color:transparent;color:#fff;}
.abbr-group{margin-bottom:22px;}
.abbr-grp-title{font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.abbr-grp-title::after{content:'';flex:1;height:1px;background:var(--border);}
.abbr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;}
.abbr-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;transition:border-color .15s;}
.abbr-card:hover{border-color:var(--border2);}
.abbr-short{font-family:'Lora',serif;font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:2px;}
.abbr-full{font-size:.78rem;color:var(--text2);margin-bottom:3px;line-height:1.4;}
.abbr-note{font-size:.67rem;color:var(--muted);line-height:1.4;}
.abbr-tag{display:inline-block;font-size:.52rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:10px;margin-top:4px;}

/* ══ FLOWCHARTS ══ */
.flow-wrap{max-width:800px;margin:0 auto;}
.flow-sel{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.fsb{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 10px;cursor:pointer;text-align:center;transition:all .15s;}
.fsb:hover{border-color:var(--border2);}
.fsb.active{background:linear-gradient(135deg,#0a2540,#0d1f50);border-color:rgba(14,165,233,.35);}
.fsb-icon{font-size:1.5rem;margin-bottom:7px;}
.fsb-name{font-weight:700;font-size:.82rem;color:var(--text);margin-bottom:2px;}
.fsb-sub{font-size:.6rem;color:var(--muted);}
.flow-diagram{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;animation:slideUp .25s ease both;}
.flow-title{font-family:'Lora',serif;font-size:1.15rem;font-weight:700;margin-bottom:5px;}
.flow-desc{font-size:.75rem;color:var(--text2);line-height:1.65;margin-bottom:20px;}
.flow-nodes{display:flex;flex-direction:column;align-items:center;}
.fn{width:100%;max-width:480px;border:2px solid var(--border);border-radius:var(--r-sm);padding:12px 16px;text-align:center;position:relative;}
.fn.start{background:linear-gradient(135deg,var(--teal),var(--purple));border-color:transparent;border-radius:24px;}
.fn.start .fn-t{color:#fff;}
.fn.start .fn-s{color:rgba(255,255,255,.7);}
.fn.decision{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.3);}
.fn.decision .fn-t{color:var(--yellow2);}
.fn.action{background:rgba(14,165,233,.06);border-color:rgba(14,165,233,.2);}
.fn.action .fn-t{color:var(--teal2);}
.fn.result{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.25);}
.fn.result .fn-t{color:var(--green2);}
.fn.warning{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.2);}
.fn.warning .fn-t{color:var(--red2);}
.fn-t{font-size:.85rem;font-weight:700;color:var(--text);margin-bottom:3px;}
.fn-s{font-size:.72rem;color:var(--text2);line-height:1.55;}
.farrow{display:flex;flex-direction:column;align-items:center;padding:4px 0;}
.farrow-line{width:2px;height:18px;background:var(--border2);}
.farrow-head{width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid var(--border2);}
.farrow-lbl{font-size:.6rem;font-weight:600;color:var(--muted);background:var(--navy);padding:2px 8px;border-radius:10px;border:1px solid var(--border);margin:2px 0;}
.fbranch{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:480px;margin:4px 0;}
.fbranch-item{display:flex;flex-direction:column;align-items:center;gap:4px;}
.fbranch-lbl{font-size:.6rem;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}

/* ══ CLINICAL CASES ══ */
.case-wrap{max-width:580px;margin:0 auto;}
.case-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px;}
.case-badge{display:inline-flex;align-items:center;gap:5px;font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:12px;}
.case-badge.cardio{background:rgba(239,68,68,.1);color:var(--red2);border:1px solid rgba(239,68,68,.2);}
.case-badge.endo{background:rgba(16,185,129,.1);color:var(--green2);border:1px solid rgba(16,185,129,.2);}
.case-badge.neuro{background:rgba(139,92,246,.1);color:var(--purple2);border:1px solid rgba(139,92,246,.2);}
.case-badge.resp{background:rgba(14,165,233,.1);color:var(--teal2);border:1px solid rgba(14,165,233,.2);}
.case-badge.renal{background:rgba(245,158,11,.1);color:var(--yellow2);border:1px solid rgba(245,158,11,.2);}
.case-badge.infect{background:rgba(249,115,22,.1);color:#fb923c;border:1px solid rgba(249,115,22,.2);}
.case-scenario{font-size:.88rem;font-weight:600;line-height:1.6;margin-bottom:14px;color:var(--text);}
.case-question{font-size:.82rem;color:var(--teal2);font-weight:600;margin-bottom:14px;}
.case-opts{display:flex;flex-direction:column;gap:7px;}
.case-opt{background:var(--navy3);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.8rem;color:var(--text);padding:10px 13px;text-align:left;cursor:pointer;transition:all .15s;}
.case-opt:hover:not(:disabled){border-color:var(--teal);}
.case-opt.correct{background:rgba(16,185,129,.1);border-color:var(--green);color:var(--green2);}
.case-opt.wrong{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red2);}
.case-opt:disabled{cursor:default;}
.case-explain{margin-top:10px;padding:10px 13px;border-radius:var(--r-sm);font-size:.74rem;line-height:1.6;display:none;}
.case-explain.show{display:block;}
.case-explain.ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:var(--green2);}
.case-explain.bad{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red2);}
.case-next{width:100%;background:linear-gradient(135deg,var(--teal),var(--purple));border:none;border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;color:#fff;padding:11px;margin-top:10px;cursor:pointer;display:none;}
.case-next.show{display:block;}
.case-score-bar{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:14px;}
.csb-item{text-align:center;}
.csb-val{font-family:'Lora',serif;font-size:1.2rem;font-weight:700;}
.csb-lbl{font-size:.52rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}

/* ══ BOOKMARKS ══ */
.bm-card{background:var(--card);border:1px solid rgba(245,158,11,.3);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;transition:all .15s;}
.bm-card:hover{border-color:rgba(245,158,11,.5);}
.bm-brand{font-family:'Lora',serif;font-size:.95rem;font-weight:700;}
.bm-gen{font-size:.68rem;color:var(--teal2);margin-top:2px;font-weight:500;}
.bm-cls{font-size:.6rem;color:var(--muted);margin-top:3px;}
.bm-rm{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.65rem;padding:5px 9px;cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap;}
.bm-rm:hover{border-color:var(--red);color:var(--red2);}

/* ══ ADMIN ══ */
.lock-box{max-width:380px;margin:60px auto;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:36px 28px;text-align:center;}
.lock-icon{font-size:2.8rem;margin-bottom:14px;}
.lock-box h2{font-family:'Lora',serif;font-size:1.3rem;font-weight:700;margin-bottom:8px;}
.lock-box p{font-size:.8rem;color:var(--text2);margin-bottom:22px;line-height:1.6;}
.lock-input{width:100%;background:var(--navy3);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem;color:var(--text);padding:12px 16px;outline:none;text-align:center;letter-spacing:.2em;margin-bottom:12px;transition:border-color .15s;}
.lock-input:focus{border-color:var(--teal);}
.lock-input::placeholder{letter-spacing:normal;color:var(--muted);}
.lock-btn{width:100%;background:linear-gradient(135deg,var(--teal),var(--purple));border:none;border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;font-weight:700;color:#fff;padding:12px;cursor:pointer;margin-bottom:10px;}
.lock-err{font-size:.72rem;color:var(--red2);margin-top:8px;display:none;}
.lock-err.show{display:block;}
.lock-hint{font-size:.68rem;color:var(--muted);margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.admin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.ast{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;text-align:center;}
.ast strong{display:block;font-family:'Lora',serif;font-size:1.4rem;font-weight:700;margin-bottom:2px;}
.ast span{font-size:.58rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
.add-btn{width:100%;background:linear-gradient(135deg,var(--teal),var(--purple));border:none;border-radius:var(--r);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;color:#fff;padding:13px;cursor:pointer;margin-bottom:14px;}
.af{background:var(--card);border:1.5px solid var(--teal);border-radius:var(--r);padding:16px;margin-bottom:14px;}
.af-title{font-family:'Lora',serif;font-size:.92rem;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.af-cancel{background:none;border:1px solid var(--border);border-radius:6px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.62rem;color:var(--muted);padding:3px 10px;cursor:pointer;}
.af-cancel:hover{border-color:var(--red);color:var(--red2);}
.af-row{margin-bottom:10px;}
.af-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.af-lbl{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.af-input,.af-ta,.af-sel{width:100%;background:var(--navy3);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.8rem;color:var(--text);padding:8px 11px;outline:none;transition:border-color .15s;}
.af-input:focus,.af-ta:focus,.af-sel:focus{border-color:var(--teal);}
.af-input::placeholder,.af-ta::placeholder{color:var(--muted);}
.af-ta{resize:vertical;min-height:52px;}
.af-submit{width:100%;background:linear-gradient(135deg,var(--teal),var(--purple));border:none;border-radius:var(--r-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;color:#fff;padding:11px;cursor:pointer;margin-top:6px;}
.af-err{font-size:.65rem;color:var(--red2);margin-top:6px;display:none;}
.af-err.show{display:block;}
.cdi-lbl{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.cdi{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--purple);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.cdi-brand{font-family:'Lora',serif;font-size:.9rem;font-weight:700;}
.cdi-gen{font-size:.65rem;color:var(--teal2);margin-top:2px;}
.cdi-cls{font-size:.58rem;color:var(--muted);margin-top:2px;}
.cdi-btns{display:flex;gap:5px;flex-shrink:0;}
.cdi-btn{background:none;border:1px solid var(--border);border-radius:5px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.6rem;color:var(--muted);padding:4px 9px;cursor:pointer;transition:all .15s;}
.cdi-btn.e:hover{border-color:var(--purple);color:var(--purple2);}
.cdi-btn.d:hover{border-color:var(--red);color:var(--red2);}

/* ══ CONFIRM OVERLAY ══ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center;padding:20px;}
.overlay.open{display:flex;}
.overlay-box{background:var(--card2);border:1px solid var(--border2);border-radius:18px;width:100%;max-width:420px;padding:24px 20px;animation:slideUp .2s ease;}
.overlay-title{font-family:'Lora',serif;font-size:1.1rem;font-weight:700;margin-bottom:8px;}
.overlay-msg{font-size:.8rem;color:var(--text2);line-height:1.6;margin-bottom:18px;}
.overlay-btns{display:flex;gap:10px;}
.ov-yes{flex:1;background:var(--red);border:none;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;color:#fff;padding:11px;cursor:pointer;}
.ov-no{flex:1;background:var(--navy3);border:1.5px solid var(--border);border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;color:var(--text);padding:11px;cursor:pointer;}

/* ══ MISC ══ */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .ei{font-size:2.5rem;margin-bottom:12px;}
.empty p{font-size:.78rem;line-height:1.7;}
.disclaimer{background:rgba(245,158,11,.05);border-top:1px solid rgba(245,158,11,.15);padding:8px 18px;text-align:center;font-size:.6rem;color:rgba(245,158,11,.6);line-height:1.6;flex-shrink:0;}
mark{background:rgba(14,165,233,.2);color:var(--teal2);border-radius:2px;padding:0 2px;}

/* ══ RESPONSIVE ══ */
@media(min-width:768px){
  .scroll-area{padding:24px 32px 90px;}
  #content{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;}
  #content>.drug-card{margin-bottom:0;}
  #content>.greeting,#content>.greeting-sub,#content>.stats-row,
  #content>.streak-card,#content>.section-hdr,#content>.quick-grid,
  #content>.recent-list,#content>.flash-wrap,#content>.quiz-wrap,
  #content>.ix-wrap,#content>.abbr-wrap,#content>.flow-wrap,
  #content>.case-wrap,#content>.bm-card,#content>.admin-stats,
  #content>.add-btn,#content>.af,#content>.cdi-lbl,#content>.cdi,
  #content>.antidote-card,#content>.antidote-search,#content>.antidote-group,
  #content>.empty{grid-column:1/-1;}
  .stats-row{grid-template-columns:repeat(4,1fr);}
  .quick-grid{grid-template-columns:repeat(8,1fr);}
}
@media(max-width:767px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .quick-grid{grid-template-columns:repeat(4,1fr);}
}

@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
</style>
</head>
<body>

<div class="app-header">
  <div class="header-inner">

    const idx = all.indexOf(d);

        <div class="dc-chev">${open?'▲ less':'▼ more'}</div>
      </div>
      <div class="dc-body${open?' open':''}" id="body-${idx}">
        <div class="dc-row"><span class="dc-lbl">MOA</span><span class="dc-val moa">${hl(d.moa,q)}</span></div>
        <div class="dc-row"><span class="dc-lbl">Use</span><span class="dc-val ind">${hl(d.indication||'—',q)}</span></div>
        <div class="dc-row"><span class="dc-lbl">ADRs</span><span class="dc-val adr">${hl(d.side||'—',q)}</span></div>

            <button class="dc-btn" onclick="cpTxt('${esc(d.mnemonic||d.side||'')}',this,'⎘ Tip')">⎘ Tip</button>

function cpDrug(idx,btn) { const d=getAllDrugs()[idx]; cpTxt(`Brand: ${d.brand}\nGeneric: ${d.generic}\nClass: ${d.class}\nMOA: ${d.moa}\nIndication: ${d.indication||''}\nADRs: ${d.side||''}\nDose: ${d.dose||''}\nRenal: ${d.renal||''}\nMnemonic: ${d.mnemonic||''}`,btn,'⎘ Copy'); }

let fDeck=[],fIdx=0,fFlipped=false,fMode='brand',fGot=0,fSkip=0;
function renderFlash(){fDeck=[...getAllDrugs()].sort(()=>Math.random()-.5);fIdx=0;fFlipped=false;fGot=0;fSkip=0;showFlash();}
function showFlash(){
  const d=fDeck[fIdx%fDeck.length];if(!d)return;
  const modes={
    brand:{front:d.brand,fL:'Brand Name',back:`<div class="flash-back-top">${d.generic}</div><div class="flash-back">${d.moa}</div>`,bL:'Generic + MOA'},
    class:{front:d.generic,fL:'Generic Name',back:`<div class="flash-back" style="font-size:1rem;font-weight:700">${d.class}</div><div class="flash-back" style="font-size:.75rem;opacity:.7;margin-top:5px">${d.brand}</div>`,bL:'Drug Class'},
    mnem:{front:d.mnemonic?d.mnemonic.split('—')[0].trim():d.indication,fL:'Memory Tip',back:`<div class="flash-back-top">${d.brand} · ${d.generic}</div><div class="flash-back">${d.moa}</div>`,bL:'Drug + MOA'},
    dose:{front:d.generic,fL:'Generic Name',back:`<div class="flash-back">${d.dose||'No dose info'}</div>${d.renal?`<div class="flash-back" style="font-size:.72rem;opacity:.7;margin-top:5px">Renal: ${d.renal}</div>`:''}`,bL:'Dose + Renal'},
    anti:{front:'What is the antidote for: '+d.brand,fL:'Drug',back:`<div class="flash-back" style="font-size:.85rem">No specific antidote — supportive care</div>`,bL:'Answer'},
  };
  const m=modes[fMode]||modes.brand;
  const prog=Math.round((fIdx/fDeck.length)*100);
  document.getElementById('content').innerHTML=`<div class="flash-wrap">
    <div class="flash-modes">
      ${['brand','class','mnem','dose'].map(mode=>`<button class="fm-btn${fMode===mode?' active':''}" onclick="setFM('${mode}')">${{brand:'Brand→MOA',class:'Generic→Class',mnem:'Mnemonic',dose:'Dose+Renal'}[mode]}</button>`).join('')}
    </div>
    <div class="flash-prog-bar"><div class="flash-prog-fill" style="width:${prog}%"></div></div>
    <div class="flash-counter">${fIdx+1} / ${fDeck.length} cards</div>
    <div class="flash-card${fFlipped?' flipped':''}" onclick="flipFlash()">
      <div class="flash-side-lbl">${fFlipped?m.bL:m.fL}</div>
      ${fFlipped?m.back:`<div class="flash-front">${m.front||'—'}</div>`}
      <div class="flash-hint">${fFlipped?'Tap to flip back':'Tap to reveal →'}</div>
    </div>
    <div class="flash-nav">
      <button class="flash-nav-btn" onclick="fSkipCard()">⟳ Skip</button>
      <button class="flash-nav-btn${fFlipped?' got':' go'}" onclick="fGotIt()">${fFlipped?'✓ Got it':'Flip →'}</button>
    </div>
    <div class="flash-scores">
      <div class="fs-box"><div class="fs-val" style="color:var(--green2)">${fGot}</div><div class="fs-lbl">Got it</div></div>
      <div class="fs-box"><div class="fs-val" style="color:var(--muted)">${fSkip}</div><div class="fs-lbl">Skipped</div></div>
      <div class="fs-box"><div class="fs-val">${fDeck.length}</div><div class="fs-lbl">Total</div></div>
    </div>
  </div>`;
}
function flipFlash(){fFlipped=!fFlipped;showFlash();}
function fGotIt(){if(!fFlipped){fFlipped=true;showFlash();return;}fGot++;fFlipped=false;fIdx=(fIdx+1)%fDeck.length;showFlash();}
function fSkipCard(){fSkip++;fFlipped=false;fIdx=(fIdx+1)%fDeck.length;showFlash();}
function setFM(m){fMode=m;fFlipped=false;showFlash();}

function startQuiz(){qQ=[...QUIZ].sort(()=>Math.random()-.5);qI=0;qC=0;qW=0;qAns=false;if(qTimer)clearInterval(qTimer);renderQ();}
function renderQ(){
  if(qI>=qQ.length){showDone();return;}
  const q=qQ[qI];const sh=q.opts.map((o,i)=>({t:o,o:i})).sort(()=>Math.random()-.5);const ci=sh.findIndex(s=>s.o===q.c);const prog=Math.round((qI/qQ.length)*100);
  if(qMode==='timed'){qTime=30;if(qTimer)clearInterval(qTimer);qTimer=setInterval(()=>{qTime--;const tv=document.getElementById('tVal');if(tv){tv.textContent=qTime;tv.className='qtb-val'+(qTime<=10?' urgent':'');}if(qTime<=0){clearInterval(qTimer);autoFail(ci);}},1000);}
  document.getElementById('content').innerHTML=`<div class="quiz-wrap">
    <div class="quiz-topbar">
      <div class="qtb"><div class="qtb-val g">${qC}</div><div class="qtb-lbl">Correct</div></div>
      ${qMode==='timed'?`<div class="qtb" style="flex:1"><div class="qtb-val" id="tVal">${qTime}</div><div class="qtb-lbl">Seconds</div></div>`:`<div class="qtb" style="flex:1"><div class="qtb-val" style="font-size:.9rem">Q${qI+1}/${qQ.length}</div><div class="qtb-lbl">Progress</div></div>`}
      <div class="qtb"><div class="qtb-val r">${qW}</div><div class="qtb-lbl">Wrong</div></div>
    </div>
    <div class="qpbar"><div class="qpfill" style="width:${prog}%"></div></div>
    <div class="quiz-card">
      <div class="q-cat">Question ${qI+1} of ${qQ.length}</div>
      <div class="q-txt">${q.q}</div>
      <div class="q-opts">${sh.map((s,i)=>`<button class="q-opt" id="qo${i}" onclick="ansQ(${i},${ci},'${escQ(q.exp)}')">${s.t}</button>`).join('')}</div>
      <div class="q-fb" id="qfb"></div>
      <button class="q-next" id="qnext" onclick="nextQ()">Next Question →</button>
    </div>
  </div>`;
}
function autoFail(ci){if(qAns)return;qAns=true;qW++;document.querySelectorAll('.q-opt').forEach((b,i)=>{b.disabled=true;if(i===ci)b.classList.add('correct');});const fb=document.getElementById('qfb');fb.className='q-fb show bad';fb.innerHTML=`⏱ Time's up! — ${qQ[qI].exp}`;document.getElementById('qnext').classList.add('show');}
function ansQ(chosen,correct,exp){if(qAns)return;qAns=true;if(qTimer)clearInterval(qTimer);document.querySelectorAll('.q-opt').forEach((b,i)=>{b.disabled=true;if(i===correct)b.classList.add('correct');if(i===chosen&&chosen!==correct)b.classList.add('wrong');});const fb=document.getElementById('qfb');if(chosen===correct){qC++;fb.className='q-fb show ok';fb.innerHTML=`✓ Correct! — ${exp}`;}else{qW++;fb.className='q-fb show bad';fb.innerHTML=`✗ Incorrect. — ${exp}`;}document.getElementById('qnext').classList.add('show');}
function nextQ(){qI++;qAns=false;renderQ();}
function escQ(s){return(s||'').replace(/'/g,"\\'").replace(/\n/g,' ');}
function showDone(){if(qTimer)clearInterval(qTimer);studyData.totalQ+=qQ.length;studyData.totalCorrect+=qC;persist();const pct=Math.round(qC/qQ.length*100);const grade=pct>=90?'🏆':pct>=75?'📚':pct>=55?'💪':'📖';const msg=pct>=90?'Outstanding result!':pct>=75?'Strong — review the ones you missed.':pct>=55?'Good effort — keep studying.':'Review the drug library and try again.';document.getElementById('content').innerHTML=`<div class="quiz-wrap"><div class="quiz-done"><div class="done-ring">${pct}%</div><h2>${grade} ${pct>=90?'Excellent!':pct>=75?'Well done!':'Keep going!'}</h2><p>${qC} of ${qQ.length} correct<br>${msg}</p><div class="done-btns"><button class="done-btn" onclick="startQuiz()">Retry</button><button class="done-btn out" onclick="renderQuizMenu()">← Menu</button></div></div></div>`;}

// ════════════════════════════════════════════════════════
// CLINICAL CASES
// ════════════════════════════════════════════════════════
let caseIdx=0,caseCorrect=0,caseWrong=0,caseAns=false;
function renderCases(){
  caseIdx=0;caseCorrect=0;caseWrong=0;caseAns=false;
  showCase();
}
function showCase(){
  if(caseIdx>=CASES.length){showCaseDone();return;}
  const c=CASES[caseIdx];const sh=c.opts.map((o,i)=>({t:o,o:i})).sort(()=>Math.random()-.5);const ci=sh.findIndex(s=>s.o===c.c);
  document.getElementById('content').innerHTML=`<div class="case-wrap">
    <div class="case-score-bar">
      <div class="csb-item"><div class="csb-val" style="color:var(--green2)">${caseCorrect}</div><div class="csb-lbl">Correct</div></div>
      <div class="csb-item"><div class="csb-val">Case ${caseIdx+1}/${CASES.length}</div><div class="csb-lbl">Progress</div></div>
      <div class="csb-item"><div class="csb-val" style="color:var(--red2)">${caseWrong}</div><div class="csb-lbl">Wrong</div></div>
    </div>
    <div class="case-card">
      <div class="case-badge ${c.cat}">${c.badge}</div>
      <div class="case-scenario">${c.scenario}</div>
      <div class="case-question">❓ ${c.question}</div>
      <div class="case-opts">${sh.map((s,i)=>`<button class="case-opt" id="co${i}" onclick="ansCase(${i},${ci},'${escQ(c.exp)}')">${s.t}</button>`).join('')}</div>
      <div class="case-explain" id="cexp"></div>
      <button class="case-next" id="cnext" onclick="nextCase()">${caseIdx<CASES.length-1?'Next Case →':'See Results'}</button>
    </div>
  </div>`;
}
function ansCase(chosen,correct,exp){if(caseAns)return;caseAns=true;document.querySelectorAll('.case-opt').forEach((b,i)=>{b.disabled=true;if(i===correct)b.classList.add('correct');if(i===chosen&&chosen!==correct)b.classList.add('wrong');});const fb=document.getElementById('cexp');if(chosen===correct){caseCorrect++;fb.className='case-explain show ok';fb.innerHTML=`✓ Correct! — ${exp}`;}else{caseWrong++;fb.className='case-explain show bad';fb.innerHTML=`✗ Incorrect. — ${exp}`;}document.getElementById('cnext').classList.add('show');}
function nextCase(){caseIdx++;caseAns=false;showCase();}
function showCaseDone(){const pct=Math.round(caseCorrect/CASES.length*100);document.getElementById('content').innerHTML=`<div class="case-wrap"><div style="text-align:center;padding:20px"><div style="font-family:'Lora',serif;font-size:3rem;margin-bottom:12px">${pct>=80?'🏆':pct>=60?'📚':'💪'}</div><div style="font-family:'Lora',serif;font-size:1.8rem;font-weight:700;margin-bottom:8px">${pct}%</div><p style="font-size:.82rem;color:var(--text2);margin-bottom:20px">${caseCorrect} of ${CASES.length} cases correct</p><div class="done-btns"><button class="done-btn" onclick="renderCases()">Retry Cases</button></div></div></div>`;}

// ════════════════════════════════════════════════════════
// INTERACTION CHECKER
// ════════════════════════════════════════════════════════
function renderIx(){
  selectedDrugsIx=[];
  document.getElementById('content').innerHTML=`<div class="ix-wrap">
    <div class="ix-title">⚡ Drug Interaction Checker</div>
    <p class="ix-sub">Type drug names and select from suggestions. Add 2+ drugs to check for interactions.</p>
    <div class="ix-search-box">
      <input id="ixIn" placeholder="🔍 Type a drug name to search…" autocomplete="off" oninput="ixSuggest(this.value)" onkeydown="if(event.key==='Escape')document.getElementById('ixDrop').classList.remove('open')">
      <div class="ix-dropdown" id="ixDrop"></div>
    </div>
    <div class="selected-pills" id="selPills"><span style="font-size:.7rem;color:var(--muted)">No drugs selected — search above</span></div>
    <button class="check-btn" onclick="checkIx()">Check Interactions →</button>
    <div id="ixResults"></div>
  </div>`;
}
function ixSuggest(val){
  const q=val.trim().toLowerCase();const box=document.getElementById('ixDrop');
  if(q.length<2){box.classList.remove('open');return;}
  const matches=getAllDrugs().filter(d=>d.brand.toLowerCase().includes(q)||d.generic.toLowerCase().includes(q)||d.class.toLowerCase().includes(q)).slice(0,8);
  if(!matches.length){box.classList.remove('open');return;}
  box.innerHTML=matches.map(d=>`<div class="ix-sug" onclick="addIxDrug('${esc(d.brand)}','${esc(d.generic)}')"><div><div class="ix-sug-name">${d.brand}</div><div style="font-size:.68rem;color:var(--muted)">${d.generic}</div></div><div class="ix-sug-class">${d.class}</div></div>`).join('');
  box.classList.add('open');
}
function addIxDrug(brand,generic){
  if(selectedDrugsIx.some(d=>d.brand===brand)){document.getElementById('ixDrop').classList.remove('open');document.getElementById('ixIn').value='';return;}
  selectedDrugsIx.push({brand,generic});
  document.getElementById('ixDrop').classList.remove('open');
  document.getElementById('ixIn').value='';
  updateSelPills();
}
function updateSelPills(){
  const el=document.getElementById('selPills');
  if(!selectedDrugsIx.length){el.innerHTML='<span style="font-size:.7rem;color:var(--muted)">No drugs selected — search above</span>';return;}
  el.innerHTML=selectedDrugsIx.map((d,i)=>`<div class="sel-pill">${d.brand} <span style="font-size:.65rem;opacity:.7">(${d.generic})</span><button onclick="rmIxDrug(${i})">✕</button></div>`).join('');
}
function rmIxDrug(i){selectedDrugsIx.splice(i,1);updateSelPills();}
function checkIx(){
  if(selectedDrugsIx.length<2){document.getElementById('ixResults').innerHTML=`<p style="font-size:.78rem;color:var(--red2);margin-top:8px">⚠ Please add at least 2 drugs to check.</p>`;return;}
  const results=[];
  for(let i=0;i<selectedDrugsIx.length;i++){
    for(let j=i+1;j<selectedDrugsIx.length;j++){
      const da=selectedDrugsIx[i];const db=selectedDrugsIx[j];
      const daT=[da.brand,da.generic].map(s=>s.toLowerCase());
      const dbT=[db.brand,db.generic].map(s=>s.toLowerCase());
      const found=INTERACTIONS.filter(ix=>{
        const ixA=ix.a.toLowerCase();const ixB=ix.b.toLowerCase();
        const fwd=daT.some(t=>t.includes(ixA)||ixA.includes(t.split(' ')[0]))&&dbT.some(t=>t.includes(ixB)||ixB.includes(t.split(' ')[0]));
        const rev=dbT.some(t=>t.includes(ixA)||ixA.includes(t.split(' ')[0]))&&daT.some(t=>t.includes(ixB)||ixB.includes(t.split(' ')[0]));
        return fwd||rev;
      });
      if(found.length)found.forEach(f=>results.push({pair:[da.brand,db.brand],ix:f}));
      else results.push({pair:[da.brand,db.brand],none:true});
    }
  }
  const so={major:0,moderate:1,minor:2};results.sort((a,b)=>((so[a.ix?.severity]??3)-(so[b.ix?.severity]??3)));
  document.getElementById('ixResults').innerHTML=results.map(r=>{
    if(r.none)return`<div class="ix-result"><div class="ix-pair-lbl">${r.pair[0]} + ${r.pair[1]}</div><span class="ix-sev none">✓ No known interaction found</span><div class="ix-desc" style="margin-top:8px">No significant interaction in this database. Always cross-check with additional references.</div></div>`;
    return`<div class="ix-result"><div class="ix-pair-lbl">${r.pair[0]} + ${r.pair[1]}</div><span class="ix-sev ${r.ix.severity}">${r.ix.severity==='major'?'⚠ MAJOR':r.ix.severity==='moderate'?'▲ Moderate':'↓ Minor'}</span><div class="ix-desc" style="margin-top:8px">${r.ix.desc}</div><div class="ix-mgmt">📋 ${r.ix.mgmt}</div></div>`;
  }).join('');
}

// ════════════════════════════════════════════════════════
function renderAbbr(){
  const cats=['All',...new Set(ABBR.map(a=>a.cat))];
  document.getElementById('content').innerHTML=`<div class="abbr-wrap">
    <div style="font-family:'Lora',serif;font-size:1.25rem;font-weight:700;margin-bottom:5px">📖 Pharmacy Abbreviations</div>
    <p style="font-size:.75rem;color:var(--text2);margin-bottom:12px;line-height:1.6">${ABBR.length} common abbreviations — routes, timing, dosing, labs, clinical & pharmacokinetics.</p>
    <input class="abbr-search" placeholder="Search abbreviations…" oninput="abbrQ=this.value.toLowerCase();renderAbbrList()" value="${abbrQ}">
    <div class="abbr-cats">${cats.map(c=>`<button class="abbr-cat${abbrCat===c?' active':''}" onclick="abbrCat='${c}';document.querySelectorAll('.abbr-cat').forEach(b=>b.classList.remove('active'));this.classList.add('active');renderAbbrList()">${c}</button>`).join('')}</div>
    <div id="abbrList"></div>
  </div>`;
  renderAbbrList();
}
function renderAbbrList(){
  const el=document.getElementById('abbrList');if(!el)return;
  const filtered=ABBR.filter(a=>{const mc=abbrCat==='All'||a.cat===abbrCat;const ms=!abbrQ||[a.short,a.full,a.note,a.cat].some(f=>f.toLowerCase().includes(abbrQ));return mc&&ms;});
  if(!filtered.length){el.innerHTML=`<div class="empty" style="padding:30px 0"><div class="ei">🔍</div><p>No matches.</p></div>`;return;}
  const grouped={};filtered.forEach(a=>{if(!grouped[a.cat])grouped[a.cat]=[];grouped[a.cat].push(a);});
  const tagMap={Routes:'route',Timing:'time',Dosing:'dose',Labs:'lab',Clinical:'clinical',Pharmacokinetics:'unit'};
  const tagColors={Routes:'rgba(16,185,129,.15)',Timing:'rgba(14,165,233,.12)',Dosing:'rgba(139,92,246,.12)',Labs:'rgba(245,158,11,.12)',Clinical:'rgba(249,115,22,.12)',Pharmacokinetics:'rgba(20,184,166,.12)'};
  const tagText={Routes:'var(--green2)',Timing:'var(--teal2)',Dosing:'var(--purple2)',Labs:'var(--yellow2)',Clinical:'#fb923c',Pharmacokinetics:'#2dd4bf'};
  el.innerHTML=Object.entries(grouped).map(([cat,items])=>`
    <div class="abbr-group">
      <div class="abbr-grp-title">${{Routes:'🔁',Timing:'⏰',Dosing:'💉',Labs:'🔬',Clinical:'🏥',Pharmacokinetics:'📊'}[cat]||'📌'} ${cat}</div>
      <div class="abbr-grid">${items.map(a=>`<div class="abbr-card">
        <div class="abbr-short">${hl(a.short,abbrQ)}</div>
        <div class="abbr-full">${hl(a.full,abbrQ)}</div>
        <div class="abbr-note">${hl(a.note,abbrQ)}</div>
        <span class="abbr-tag" style="background:${tagColors[cat]||'rgba(255,255,255,.05)'};color:${tagText[cat]||'var(--text2)'};border:1px solid ${tagText[cat]||'var(--border)'}30">${cat}</span>
      </div>`).join('')}</div>
    </div>`).join('');
}

// ════════════════════════════════════════════════════════
// FLOWCHARTS
// ════════════════════════════════════════════════════════
function renderFlow(){
  document.getElementById('content').innerHTML=`<div class="flow-wrap">
    <div style="font-family:'Lora',serif;font-size:1.25rem;font-weight:700;margin-bottom:5px">🔀 Clinical Flowcharts</div>
    <p style="font-size:.75rem;color:var(--text2);margin-bottom:16px;line-height:1.6">Step-by-step treatment algorithms. <strong style="color:var(--yellow2)">For study purposes only</strong> — not clinical guidance.</p>
    <div class="flow-sel">${FLOWS.map(f=>`<div class="fsb${activeFlow===f.id?' active':''}" onclick="activeFlow='${f.id}';renderFlowDiagram()"><div class="fsb-icon">${f.icon}</div><div class="fsb-name">${f.name}</div><div class="fsb-sub">${f.sub}</div></div>`).join('')}</div>
    <div id="flowDiagram"></div>
  </div>`;
  renderFlowDiagram();
}
function renderFlowDiagram(){
  const el=document.getElementById('flowDiagram');if(!el)return;
  const f=FLOWS.find(x=>x.id===activeFlow);if(!f){el.innerHTML='';return;}
  document.querySelectorAll('.fsb').forEach(b=>b.classList.toggle('active',b.querySelector('.fsb-name').textContent===f.name));
  el.innerHTML=`<div class="flow-diagram"><div class="flow-title">${f.title}</div><div class="flow-desc">${f.desc}</div><div class="flow-nodes">${renderNodes(f.nodes)}</div></div>`;
}
function renderNodes(nodes){
  return nodes.map(n=>{
    if(n.type==='arrow')return`<div class="farrow"><div class="farrow-line"></div>${n.label?`<div class="farrow-lbl">${n.label}</div><div class="farrow-line"></div>`:''}<div class="farrow-head"></div></div>`;
    if(n.type==='branch')return`<div class="fbranch">${n.items.map(item=>`<div class="fbranch-item"><div class="fbranch-lbl">${item.label}</div>${renderNodes(item.nodes)}</div>`).join('')}</div>`;
    return`<div class="fn ${n.type}"><div class="fn-t">${n.title}</div>${n.sub?`<div class="fn-s">${n.sub.replace(/\n/g,'<br>')}</div>`:''}</div>`;
  }).join('');
}

// ADMIN
// ════════════════════════════════════════════════════════
function renderAdminLock(){document.getElementById('content').innerHTML=`<div class="lock-box"><div class="lock-icon">🔐</div><h2>Admin Access</h2><p>Password protected.<br>Only the app owner can add or edit drugs.</p><input type="password" class="lock-input" id="adminPw" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()"><button class="lock-btn" onclick="checkPw()">Unlock Admin Panel</button><div class="lock-err" id="adminErr">❌ Incorrect password. Try again.</div><div class="lock-hint">💡 Contact the app owner for access</div></div>`;setTimeout(()=>document.getElementById('adminPw')?.focus(),100);}
function checkPw(){const input=document.getElementById('adminPw');const err=document.getElementById('adminErr');if(input.value===ADMIN_PW){adminUnlocked=true;renderAdmin();}else{input.value='';err.classList.add('show');input.style.borderColor='var(--red)';setTimeout(()=>{err.classList.remove('show');input.style.borderColor='';},3000);}}
function renderAdmin(eIdx){
  if(!adminUnlocked){renderAdminLock();return;}
  const isEdit=eIdx!==undefined;const d=isEdit?customDrugs[eIdx]:{};const classes=[...new Set(getAllDrugs().map(x=>x.class))].sort();
  document.getElementById('content').innerHTML=`
    <div class="admin-stats"><div class="ast"><strong>${DRUGS.length}</strong><span>Built-in</span></div><div class="ast"><strong>${customDrugs.length}</strong><span>Custom</span></div><div class="ast"><strong>${getAllDrugs().length}</strong><span>Total</span></div></div>
    <div class="af">
      <div class="af-title">${isEdit?'✏️ Edit Drug':'➕ Add New Drug'}${isEdit?`<button class="af-cancel" onclick="renderAdmin()">Cancel</button>`:''}</div>
      <div class="af-row2"><div><div class="af-lbl">Brand Name *</div><input class="af-input" id="af-brand" placeholder="e.g. Norvasc" value="${d.brand||''}"></div><div><div class="af-lbl">Generic Name *</div><input class="af-input" id="af-generic" placeholder="e.g. amlodipine" value="${d.generic||''}"></div></div>
      <div class="af-row"><div class="af-lbl">Drug Class *</div><select class="af-sel" id="af-class"><option value="">— Select —</option>${classes.map(c=>`<option value="${c}"${d.class===c?' selected':''}>${c}</option>`).join('')}</select><input class="af-input" id="af-class-new" placeholder="Or type new class…" style="margin-top:6px" value="${d.class&&!classes.includes(d.class)?d.class:''}"></div>
      <div class="af-row"><div class="af-lbl">Mechanism of Action *</div><textarea class="af-ta" id="af-moa" placeholder="e.g. Inhibits HMG-CoA reductase → ↓ cholesterol">${d.moa||''}</textarea></div>
      <div class="af-row"><div class="af-lbl">Indication</div><textarea class="af-ta" id="af-ind" placeholder="e.g. HTN, Angina">${d.indication||''}</textarea></div>
      <div class="af-row"><div class="af-lbl">Side Effects</div><textarea class="af-ta" id="af-side" placeholder="e.g. Peripheral edema, headache">${d.side||''}</textarea></div>
      <div class="af-row2"><div><div class="af-lbl">Dosing</div><input class="af-input" id="af-dose" placeholder="e.g. 5–10mg OD" value="${d.dose||''}"></div><div><div class="af-lbl">Renal Adjustment</div><input class="af-input" id="af-renal" placeholder="e.g. Avoid CrCl <30" value="${d.renal||''}"></div></div>
      <div class="af-row"><div class="af-lbl">Mnemonic / Memory Tip</div><input class="af-input" id="af-mem" placeholder="e.g. NORVASC = NO cardiac effect" value="${d.mnemonic||''}"></div>
      <div class="af-err" id="af-err">Please fill in all required (*) fields.</div>
      <button class="af-submit" onclick="${isEdit?`saveDrug(${eIdx})`:'addDrug()'}">${isEdit?'💾 Save Changes':'➕ Add Drug'}</button>
    </div>
    <div class="cdi-lbl">Custom Drugs (${customDrugs.length})</div>
    ${customDrugs.length?customDrugs.map((cd,i)=>`<div class="cdi"><div><div class="cdi-brand">${cd.brand}</div><div class="cdi-gen">${cd.generic}</div><div class="cdi-cls">${cd.class}</div></div><div class="cdi-btns"><button class="cdi-btn e" onclick="renderAdmin(${i})">✏️</button><button class="cdi-btn d" onclick="promptDel(${i})">🗑</button></div></div>`).join(''):`<div class="empty" style="padding:24px 0"><div class="ei">➕</div><p>No custom drugs yet.<br>Use the form above.</p></div>`}`;
  if(isEdit)editIdx=eIdx;
}
function getForm(){return{brand:document.getElementById('af-brand').value.trim(),generic:document.getElementById('af-generic').value.trim(),class:document.getElementById('af-class-new').value.trim()||document.getElementById('af-class').value.trim(),moa:document.getElementById('af-moa').value.trim(),indication:document.getElementById('af-ind').value.trim(),side:document.getElementById('af-side').value.trim(),dose:document.getElementById('af-dose').value.trim(),renal:document.getElementById('af-renal').value.trim(),mnemonic:document.getElementById('af-mem').value.trim()};}
function addDrug(){const d=getForm();if(!d.brand||!d.generic||!d.class||!d.moa){document.getElementById('af-err').classList.add('show');return;}customDrugs.push(d);persist();buildChips();renderAdmin();}
function saveDrug(i){const d=getForm();if(!d.brand||!d.generic||!d.class||!d.moa){document.getElementById('af-err').classList.add('show');return;}customDrugs[i]=d;persist();buildChips();renderAdmin();}
function editDrug(i){showTab('admin');setTimeout(()=>renderAdmin(i),50);}
function promptDel(i){pendingDel=i;document.getElementById('confirmMsg').textContent=`Delete "${customDrugs[i].brand}" (${customDrugs[i].generic})?`;document.getElementById('confirmOverlay').classList.add('open');}
function confirmDel(){if(pendingDel===null)return;customDrugs.splice(pendingDel,1);pendingDel=null;persist();buildChips();closeOverlay();if(currentTab==='admin')renderAdmin();else renderDrugs();}
function closeOverlay(){document.getElementById('confirmOverlay').classList.remove('open');pendingDel=null;}

// ════════════════════════════════════════════════════════
// INIT

buildChips();
updateBmDot();
showTab('home');
</script>
